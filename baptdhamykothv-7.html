            } catch (e) {}
        }

        // 診断パネルの表示/非表示切り替え（Ctrl+Shift+D で表示）
        document.addEventListener('keydown', (event) => {
            // Ctrl+Shift+D: 診断パネル
            if (event.ctrlKey && event.shiftKey && event.key === 'D') {
                event.preventDefault();
                diagnosticsPanel.style.display = diagnosticsPanel.style.display === 'none' ? 'block' : 'none';
                if (diagnosticsPanel.style.display === 'block') {
                    updateDiagnostics();
                    // 診断パネル表示中は定期的に更新
                    if (!window.diagInterval) {
                        window.diagInterval = setInterval(() => {
                            if (diagnosticsPanel.style.display === 'block') {
                                updateDiagnostics();
                            }
                        }, 1000);
                    }
                } else {
                    if (window.diagInterval) {
                        clearInterval(window.diagInterval);
                        window.diagInterval = null;
                    }
                }
            }
            
            // Ctrl+Shift+L: ログパネル
            if (event.ctrlKey && event.shiftKey && event.key === 'L') {
                event.preventDefault();
                const logPanel = document.getElementById('debugLogPanel');
                logPanel.style.display = logPanel.style.display === 'none' ? 'block' : 'none';
            }
            
            // Ctrl+Shift+E: エラーパネル
            if (event.ctrlKey && event.shiftKey && event.key === 'E') {
                event.preventDefault();
                const errorPanel = document.getElementById('debugErrorPanel');
                errorPanel.style.display = errorPanel.style.display === 'none' ? 'block' : 'none';
            }
            
            // Ctrl+Shift+A: 全ペイン
            if (event.ctrlKey && event.shiftKey && event.key === 'A') {
                event.preventDefault();
                diagnosticsPanel.style.display = diagnosticsPanel.style.display === 'none' ? 'block' : 'none';
                document.getElementById('debugLogPanel').style.display = diagnosticsPanel.style.display;
                document.getElementById('debugErrorPanel').style.display = diagnosticsPanel.style.display;
            }
        });

        // 初期診断実行
        updateDiagnostics();

        function loadAllPageData(file) {
            const reader = new FileReader();
            
            reader.onerror = function(event) {
                const msg = logError('ファイル読み込みエラー', reader.error);
                alert('JSONファイルの読み込みに失敗しました。別のファイルをお試しください。');
            };

            reader.onload = function(event) {
                try {
                    const loadData = JSON.parse(event.target.result);
                    debugLog('JSON parsed successfully', {pages: loadData.pages?.length});

                    // バージョン確認
                    if (loadData.version !== "1.0") {
                        alert('対応していないファイル形式です。バージョン1.0のファイルを使用してください。');
                        return;
                    }

                    // 全ページを初期化
                    for (let i = 0; i < MAX_PAGES; i++) {
                        pages[i] = {
                            bgmFiles: [null, null],
                            bgmFileObjects: [null, null],
                            bgmNames: [null, null],
                            bgmAudioInfos: [null, null],
                            seFiles: {},
                            seFileObjects: {},
                            seNames: {},
                            seEnabled: getDefaultSeEnabledState(),  // デフォルト値を統一
                            bgmMemos: [null, null],
                            seMemos: {},
                            playingAudios: [],
                            maxDuration: 0,
                            timelineMaxDuration: 30,
                            pixelsPerSecond: 0,
                            bgmStartMinutes: 0,
                            bgmStartSeconds: 0,
                            bgmVolume: 100,     // 初期値
                            bgmPitch: 100,      // 初期値
                            seVolume: 100,      // 初期値
                            sePitch: 100        // 初期値
                        };
                    }

                    // ロードしたデータをページに反映
                    if (loadData.pages && Array.isArray(loadData.pages)) {
                        loadData.pages.forEach((pageData) => {
                            if (pageData.pageNum >= 1 && pageData.pageNum <= MAX_PAGES) {
                                const pageIndex = pageData.pageNum - 1;
                                pages[pageIndex].bgmNames = pageData.bgmNames || [null, null];
                                pages[pageIndex].seNames = pageData.seNames || {};
                                pages[pageIndex].seEnabled = pageData.seEnabled || getDefaultSeEnabledState();
                                pages[pageIndex].bgmMemos = pageData.bgmMemos || [null, null];
                                pages[pageIndex].seMemos = pageData.seMemos || {};
                                pages[pageIndex].bgmStartMinutes = pageData.bgmStartMinutes || 0;
                                pages[pageIndex].bgmStartSeconds = pageData.bgmStartSeconds || 0;
                                pages[pageIndex].bgmVolume = pageData.bgmVolume || 100;  // スライダー設定を復元
                                pages[pageIndex].bgmPitch = pageData.bgmPitch || 100;    // スライダー設定を復元
                                pages[pageIndex].seVolume = pageData.seVolume || 100;    // スライダー設定を復元
                                pages[pageIndex].sePitch = pageData.sePitch || 100;      // スライダー設定を復元

                                // BGM 音声データを復元
                                if (pageData.bgmAudio) {
                                    for (let j = 0; j < 2; j++) {
                                        if (pageData.bgmAudio[j]) {
                                            const arrayBuffer = base64ToArrayBuffer(pageData.bgmAudio[j]);
                                            const blob = new Blob([arrayBuffer], { type: 'audio/mp3' });
                                            pages[pageIndex].bgmFiles[j] = URL.createObjectURL(blob);
                                            pages[pageIndex].bgmFileObjects[j] = new File([blob], pageData.bgmNames[j] || 'bgm' + j, { type: 'audio/mp3' });
                                        }
                                    }
                                }

                                // SE 音声データを復元
                                if (pageData.seAudio) {
                                    for (let seNum in pageData.seAudio) {
                                        if (pageData.seAudio[seNum]) {
                                            const arrayBuffer = base64ToArrayBuffer(pageData.seAudio[seNum]);
                                            const blob = new Blob([arrayBuffer], { type: 'audio/mp3' });
                                            pages[pageIndex].seFiles[seNum] = URL.createObjectURL(blob);
                                            pages[pageIndex].seFileObjects[seNum] = new File([blob], pageData.seNames[seNum] || 'se' + seNum, { type: 'audio/mp3' });
                                        }
                                    }
                                }
                            }
                        });
                    }

                    // 現在のページを再読み込み
                    loadPageData(currentPage);
                    generateUIButtons();

                    // ボタンテキストを復元
                    for (let i = 0; i < 2; i++) {
                        if (bgmNames[i]) {
                            const bgmButton = document.querySelector(`.bgm-button[data-bgm="${i}"]`);
                            if (bgmButton) {
                                bgmButton.textContent = bgmNames[i];
                            }
                        }
                    }
                    for (let seNum in seNames) {
                        if (seNames[seNum]) {
                            const seButton = document.querySelector(`.se-button[data-se="${seNum}"]`);
                            if (seButton) {
                                seButton.textContent = seNames[seNum];
                            }
                        }
                    }

                    generateRuler();

                    // 全ページのBGM1を自動配置
                    for (let i = 0; i < MAX_PAGES; i++) {
                        if (pages[i].bgmFiles && pages[i].bgmFiles[0]) {
                            pages[i].bgmAudioInfos = [null, null];
                            pages[i].bgmAudioInfos[0] = null;  // 初期化
                        }
                    }

                    // 保存されていたページに移動（BGM1も自動配置される）
                    const targetPage = loadData.currentPage || 1;
                    if (targetPage !== currentPage) {
                        goToPage(targetPage);
                    } else {
                        // 現在のページの場合はBGM1を手動配置
                        if (bgmFiles[0] && !bgmAudioInfos[0]) {
                            bgmAudioInfos[0] = setupBGM(bgmFiles[0], bgmNames[0] || 'BGM 1', 0);
                        }
                    }

                    alert('設定を読み込みました！');
                    debugLog('All page data loaded successfully');
                } catch (error) {
                    const msg = logError('JSON解析エラー', error);
                    alert('ファイルの読み込みに失敗しました。別のJSONファイルをお試しください。\n\n詳細: ' + error.message);
                }
            };

            reader.readAsText(file);
        }

        // ページ初期化時に bgmFileObjects と seFileObjects を追加
        for (let p = 0; p < MAX_PAGES; p++) {
            if (!pages[p].bgmFileObjects) {
                pages[p].bgmFileObjects = [null, null];
            }
            if (!pages[p].seFileObjects) {
                pages[p].seFileObjects = {};
            }
            if (!pages[p].bgmMemos) {
                pages[p].bgmMemos = [null, null];
            }
            if (!pages[p].seMemos) {
                pages[p].seMemos = {};
            }
            if (pages[p].bgmStartMinutes === undefined) {
                pages[p].bgmStartMinutes = 0;
            }
            if (pages[p].bgmStartSeconds === undefined) {
                pages[p].bgmStartSeconds = 0;
            }
            if (pages[p].bgmVolume === undefined) {
                pages[p].bgmVolume = 100;
            }
            if (pages[p].bgmPitch === undefined) {
                pages[p].bgmPitch = 100;
            }
            if (pages[p].seVolume === undefined) {
                pages[p].seVolume = 100;
            }
            if (pages[p].sePitch === undefined) {
                pages[p].sePitch = 100;
            }
            if (pages[p].seEnabled === undefined) {
                pages[p].seEnabled = getDefaultSeEnabledState();
            }
        }

        // 初期設定
        leftArrowBtn.disabled = true;
        generateUIButtons();  // 初期化時にボタンを生成
        setupControlButtonListeners();  // 制御ボタンのイベントリスナーを初期化時のみ登録
        setupDragDropListeners();  // ドラッグ&ドロップ機能を初期化

        // ===== iPad Safari対応: ページロード時の初期化 =====
        
        // ローカルファイル警告（file:// プロトコルの場合）
        if (location.protocol === 'file:') {
            const warning = '⚠️ ローカルファイル実行検出\n\n' +
                'Safariでローカルファイルとして開かれた場合、一部の音声機能が制限される可能性があります。\n\n' +
                'GitHub Pages等のHTTPS環境での実行を推奨します。';
            debugLog('Local file detected - displaying warning', { protocol: location.protocol });
            // ページロード後に警告を表示
            setTimeout(() => {
                alert(warning);
            }, 1000);
        }
        
        // Safari環境での初期診断
        const safariEnv = detectSafariEnvironment();
        const safariDiag = getSafariDiagnostics();
        
        if (safariEnv.isSafari || safariEnv.isIPad) {
            debugLog('Safari/iPad環境を検出', {
                isSafari: safariEnv.isSafari,
                isIPad: safariEnv.isIPad,
                isIOS: safariEnv.isIOS,
                canUseWebAudio: safariDiag.canUseWebAudio
            });
            
            // AudioContext対応確認
            if (!safariDiag.canUseWebAudio) {
                logError('Safari互換性警告', 'Web Audio APIがサポートされていません');
                alert('このブラウザでは Web Audio API がサポートされていません。\n' +
                    '最新のSafariまたは他のブラウザをお試しください。');
            }
        }
        
        // 音声フォーマット対応表示
        const formats = checkAudioFormatsSupport();
        debugLog('Audio format support detected', formats);
        
        // 非推奨フォーマット警告
        if (formats.ogg === 'NO' && formats.flac === 'NO') {
            debugLog('Non-recommended formats not supported - this is normal for Safari');
        }

        // BGMボタンを2個生成
        // UI要素生成関数
        function generateUIButtons() {
            bgmGrid.innerHTML = '';
            seGrid.innerHTML = '';

            // BGMボタンを2個生成
            for (let i = 0; i < 2; i++) {
                const bgmItem = document.createElement('div');
                bgmItem.className = 'sound-item';
                bgmItem.innerHTML = `
                    <input type="file" class="bgm-file" data-bgm="${i}" accept=".mp3,.wav,.m4a,.ogg,.aac,.flac,audio/mpeg,audio/wav,audio/mp4,audio/ogg,audio/flac,audio/aac">
                    <button class="bgm-button" data-bgm="${i}">BGM ${i + 1} を選択</button>
                    <button class="memo-button" data-bgm="${i}">📝 メモ</button>
                `;
                bgmGrid.appendChild(bgmItem);
            }

            // 効果音ボタンを1～12まで生成
            for (let i = 1; i <= 12; i++) {
                const seItem = document.createElement('div');
                seItem.className = 'sound-item';
                seItem.innerHTML = `
                    <input type="file" class="se-file" data-se="${i}" accept=".mp3,.wav,.m4a,.ogg,.aac,.flac,audio/mpeg,audio/wav,audio/mp4,audio/ogg,audio/flac,audio/aac">
                    <button class="se-button" data-se="${i}">効果音${i}</button>
                    <button class="memo-button" data-se="${i}">📝 メモ</button>
                    <div class="se-checkbox-container">
                        <label>
                            <input type="checkbox" class="se-checkbox" data-se="${i}">
                            <span>${i}</span>
                        </label>
                    </div>
                `;
                seGrid.appendChild(seItem);
            }

            // すべて止めるボタンを効果音グリッドに追加
            const stopAllItem = document.createElement('div');
            stopAllItem.className = 'sound-item';
            stopAllItem.innerHTML = `<button id="stopAllSeBtn">⏹ すべて止める</button>`;
            seGrid.appendChild(stopAllItem);

            // イベントリスナーを再設定
            setupEventListeners();
            
            // ===== 新しく生成されたチェックボックスの状態を復元
            restoreCheckboxStates();
        }

        function setupControlButtonListeners() {
            if (controlButtonListenersInitialized) return;  // 既に登録済みの場合はスキップ
            
            // 再生ボタン
            playBtn.addEventListener('click', async function() {
                debugLog('Play button clicked - audio playback starting');
                
                // AudioContextの初期化と状態確認
                if (!audioContext) {
                    debugLog('AudioContext not initialized - initializing now');
                    const result = initAudioContext();
                    if (!result) {
                        const msg = logError('再生エラー', 'AudioContextが初期化できません');
                        alert(msg);
                        return;
                    }
                }

                // AudioContext再生成チェック
                if (audioContext.state === 'closed') {
                    debugLog('AudioContext is closed - recreating');
                    gainNode = null;
                    seGainNode = null;
                    const result = initAudioContext();
                    if (!result) {
                        alert('音声システムの初期化に失敗しました。ページをリロードしてください。');
                        return;
                    }
                }

                // resume完全待機
                const resumeSuccess = await ensureAudioContextRunning();
                if (!resumeSuccess) {
                    const explanation = getSafariErrorExplanation('InvalidStateError');
                    alert(`${explanation.title}\\n\\n${explanation.solution}`);
                    return;
                }

                let audioInfo = null;
                let bgmIndex = 0;
                if (bgmAudioInfos[0] && bgmAudioInfos[0].buffer) {
                    audioInfo = bgmAudioInfos[0];
                    bgmIndex = 0;
                } else if (bgmAudioInfos[1] && bgmAudioInfos[1].buffer) {
                    audioInfo = bgmAudioInfos[1];
                    bgmIndex = 1;
                }

                if (!audioInfo || !audioInfo.buffer) {
                    alert('再生するBGMが選択されていません');
                    return;
                }
                
                // 再生前環境チェック
                const envCheck = checkPlaybackEnvironment(audioInfo);
                if (!envCheck.canPlay) {
                    const issueText = envCheck.issues.join('\\n- ');
                    alert(`再生できません:\\n- ${issueText}`);
                    debugLog('Playback environment check failed', envCheck);
                    return;
                }
                
                if (envCheck.warnings.length > 0) {
                    debugLog('Playback warnings', envCheck.warnings);
                }

                debugLog('BGM selected for playback', {
                    fileName: audioInfo.fileName,
                    duration: audioInfo.buffer.duration,
                    bgmIndex: bgmIndex,
                    audioContextState: audioContext.state,
                    sampleRate: audioContext.sampleRate
                });

                // 指定された開始時刻を計算（分と秒から秒に変換）
                const startMinutes = parseInt(bgmStartMinutes.value) || 0;
                const startSeconds = parseInt(bgmStartSeconds.value) || 0;
                const startTime = startMinutes * 60 + startSeconds;

                // 指定時刻がAudioBufferの長さ以内であることを確認
                const clampedStartTime = Math.min(Math.max(0, startTime), audioInfo.buffer.duration);

                debugLog('BGM playback parameters', {
                    startTime: startTime,
                    clampedStartTime: clampedStartTime,
                    gainValue: gainNode.gain.value,
                    sampleRate: audioContext.sampleRate
                });

                // AudioBufferSourceNodeを作成
                const source = audioContext.createBufferSource();
                source.buffer = audioInfo.buffer;
                source.playbackRate.value = 1.0;  // 再生速度は常に1.0（固定）
                const safeDetuneAmount = sanitizeDetuneValue(detuneAmount);  // detune安全化
                source.detune.value = safeDetuneAmount;  // ピッチシフト（セント単位）

                // 接続
                source.connect(gainNode);

                // 再生開始
                audioInfo.sourceNode = source;
                audioInfo.oscillatorNode = null;

                // 指定時刻から再生開始
                source.start(0, clampedStartTime);

                audioInfo.startTime = audioContext.currentTime;
                audioInfo.pauseTime = clampedStartTime;  // 指定時刻を記録
                audioInfo.isPlaying = true;
                audioInfo.autoLoopEnabled = true;  // 自動ループを有効化
                
                playingAudios.push(audioInfo);
                playBtn.style.display = 'none';
                pauseBtn.style.display = 'block';

                // 終了コールバック
                source.onended = function() {
                    // 自動ループが有効な場合、再度再生
                    if (audioInfo.autoLoopEnabled) {
                        const newSource = audioContext.createBufferSource();
                        newSource.buffer = audioInfo.buffer;
                        newSource.playbackRate.value = 1.0;
                        const safeLoopDetune = sanitizeDetuneValue(detuneAmount);  // detune安全化
                        newSource.detune.value = safeLoopDetune;
                        newSource.connect(gainNode);
                        
                        audioInfo.sourceNode = newSource;
                        audioInfo.startTime = audioContext.currentTime;
                        audioInfo.pauseTime = 0;  // ループ時は最初から再生
                        audioInfo.isPlaying = true;
                        
                        newSource.start();
                        newSource.onended = source.onended;  // 同じendedハンドラーを再設定
                        
                        debugLog('BGM auto-loop restarted', {fileName: audioInfo.fileName});
                    } else {
                        // 自動ループなし：通常の終了処理
                        const index = playingAudios.indexOf(audioInfo);
                        if (index > -1) {
                            playingAudios.splice(index, 1);
                        }
                        playBtn.style.display = 'block';
                        pauseBtn.style.display = 'none';
                        bgmInfo.textContent = 'BGM: 準備中...';
                        audioInfo.isPlaying = false;
                        audioInfo.pauseTime = 0;
                    }
                };
            });

            // 一時停止ボタン
            pauseBtn.addEventListener('click', function() {
                for (let i = 0; i < 2; i++) {
                    const audioInfo = bgmAudioInfos[i];
                    if (audioInfo && audioInfo.isPlaying && audioInfo.sourceNode) {
                        // 現在の再生時刻を記録
                        const elapsedTime = audioContext.currentTime - audioInfo.startTime;
                        audioInfo.pauseTime += elapsedTime;

                        // 再生時間指定パネルに現在時刻を反映
                        const totalSeconds = Math.round(audioInfo.pauseTime);
                        const minutes = Math.floor(totalSeconds / 60);
                        const seconds = totalSeconds % 60;
                        bgmStartMinutes.value = minutes;
                        bgmStartSeconds.value = seconds;

                        // 再生停止
                        try {
                            audioInfo.sourceNode.stop();
                        } catch (e) {}

                        audioInfo.isPlaying = false;
                        audioInfo.autoLoopEnabled = false;  // 一時停止時は自動ループを無効化
                        const index = playingAudios.indexOf(audioInfo);
                        if (index > -1) {
                            playingAudios.splice(index, 1);
                        }
                    }
                }
                playBtn.style.display = 'block';
                pauseBtn.style.display = 'none';
            });

            // 停止ボタン
            stopBtn.addEventListener('click', function() {
                // BGMを停止
                for (let i = 0; i < 2; i++) {
                    const audioInfo = bgmAudioInfos[i];
                    if (audioInfo) {  // BGMが選択されているかどうかで判定
                        if (audioInfo.isPlaying && audioInfo.sourceNode) {
                            try {
                                audioInfo.sourceNode.stop();
                            } catch (e) {}
                            audioInfo.isPlaying = false;
                            audioInfo.autoLoopEnabled = false;  // 停止時は自動ループを無効化
                            const index = playingAudios.indexOf(audioInfo);
                            if (index > -1) {
                                playingAudios.splice(index, 1);
                            }
                        }
                        audioInfo.pauseTime = 0;
                    }
                }
                
                // playingAudios配列内のすべての音声（効果音など）を停止
                const audiosCopy = [...playingAudios];
                audiosCopy.forEach((audioInfo) => {
                    if (audioInfo && audioInfo.isPlaying && audioInfo.sourceNode) {
                        try {
                            audioInfo.sourceNode.stop();
                        } catch (e) {}
                        
                        audioInfo.isPlaying = false;
                        const index = playingAudios.indexOf(audioInfo);
                        if (index > -1) {
                            playingAudios.splice(index, 1);
                        }
                        
                        if (audioInfo.barElement) {
                            audioInfo.barElement.remove();
                        }
                    }
                });
                
                // タイマーをリセット
                bgmStartMinutes.value = 0;
                bgmStartSeconds.value = 0;
                
                playBtn.style.display = 'block';
                pauseBtn.style.display = 'none';
                bgmInfo.textContent = 'BGM: 準備中...';
            });
            
            controlButtonListenersInitialized = true;
        }

        // ドラッグ&ドロップ機能を設定する関数
        function setupDragDropListeners() {
            const container = document.querySelector('.container');
            
            // dragover イベント：ドロップ可能な状態を表示
            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                container.style.backgroundColor = 'rgba(102, 126, 234, 0.1)';
                debugLog('Dragover detected');
            });
            
            // dragleave イベント：ドロップ不可状態に戻す
            container.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.target === container) {
                    container.style.backgroundColor = '';
                }
            });
            
            // drop イベント：ファイルを受け取る
            container.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                container.style.backgroundColor = '';
                
                const files = e.dataTransfer.files;
                if (files.length === 0) return;
                
                debugLog('Files dropped', {fileCount: files.length});
                
                // ドロップされたファイルを処理
                for (let file of files) {
                    // 音声ファイルの形式を確認
                    const validAudioFormats = ['audio/mpeg', 'audio/wav', 'audio/mp4', 'audio/ogg', 'audio/aac', 'audio/flac', 'application/octet-stream'];
                    const isValidFormat = validAudioFormats.includes(file.type) || file.name.match(/\.(mp3|wav|m4a|ogg|aac|flac)$/i);
                    
                    if (!isValidFormat) {
                        alert('サポートされていない音声形式です。MP3、WAV、M4A、OGGなどをお試しください。');
                        debugLog('Invalid file format', {fileName: file.name, type: file.type});
                        continue;
                    }
                    
                    if (file.size > 100 * 1024 * 1024) {  // 100MB制限
                        alert('ファイルが大きすぎます。100MB以下の音声ファイルを使用してください。');
                        continue;
                    }
                    
                    // BGMまたはSEかを判定（ファイル名に「bgm」「se」などが含まれているか）
                    const fileName = file.name.toLowerCase();
                    const isBGM = fileName.includes('bgm') || fileName.includes('background') || fileName.includes('music');
                    const isSE = fileName.includes('se') || fileName.includes('effect') || fileName.includes('sound');
                    
                    if (isBGM) {
                        // BGMファイルとして処理
                        // BGM 1 のスロットが空いていれば使用、そうでなければBGM 2を使用
                        let bgmIndex = 0;
                        if (bgmFiles[0]) {
                            bgmIndex = 1;
                        }
                        
                        try {
                            debugLog('Processing as BGM', {fileName: file.name, bgmIndex});
                            
                            bgmFiles[bgmIndex] = URL.createObjectURL(file);
                            bgmFileObjects[bgmIndex] = file;
                            bgmNames[bgmIndex] = file.name;

                                buttonElement.textContent = file.name;

                            // 他のBGMを停止
                            for (let i = 0; i < 2; i++) {
                                if (i !== bgmIndex && bgmAudioInfos[i]) {

                                        try {
                                            bgmAudioInfos[i].sourceNode.stop();

                                        if (index > -1) {
                                            playingAudios.splice(index, 1);
                                        }
                                        bgmAudioInfos[i].isPlaying = false;
                                    }
                                    if (bgmAudioInfos[i].barElement) {
                                        bgmAudioInfos[i].barElement.remove();
                                    }
                                    bgmAudioInfos[i] = null;

                            }
                            
                            // タイマーをリセット

                            bgmStartSeconds.value = 0;
                            
                            // BGMをセットアップ
                            bgmAudioInfos[bgmIndex] = setupBGM(bgmFiles[bgmIndex], file.name, bgmIndex);
                            alert(`BGM ${bgmIndex + 1} として「${file.name}」を読み込みました。`);

                            const msg = logError('ドラッグ&ドロップ BGM処理エラー', error);
                            alert('BGMファイルの処理に失敗しました:\n' + error.message);

                    } else if (isSE) {

                        for (let i = 1; i <= 12; i++) {

                            alert(`効果音${seNum} として「${file.name}」を読み込みました。`);
                        } catch (error) {
                            const msg = logError('ドラッグ&ドロップ SE処理エラー', error);
                            alert('SE ファイルの処理に失敗しました:\n' + error.message);
                        }
                    } else {
                        // ファイル名から判定できない場合は BGM として処理
                        alert('ファイル名に「bgm」または「se」を含めてください。BGM として処理します。');
                        
                        let bgmIndex = 0;
                        if (bgmFiles[0]) {
                            bgmIndex = 1;
                        }
                        
                        try {
                            debugLog('Processing as BGM (default)', {fileName: file.name, bgmIndex});
                            
                            bgmFiles[bgmIndex] = URL.createObjectURL(file);
                            bgmFileObjects[bgmIndex] = file;
                            bgmNames[bgmIndex] = file.name;
                            const buttonElement = document.querySelector(`.bgm-button[data-bgm="${bgmIndex}"]`);
                            if (buttonElement) {
                                buttonElement.textContent = file.name;
                            }
                            
                            // 他のBGMを停止
                            for (let i = 0; i < 2; i++) {
                                if (i !== bgmIndex && bgmAudioInfos[i]) {
                                    if (bgmAudioInfos[i].sourceNode) {
                                        try {
                                            bgmAudioInfos[i].sourceNode.stop();
                                        } catch (err) {}
                                        const index = playingAudios.indexOf(bgmAudioInfos[i]);
                                        if (index > -1) {
                                            playingAudios.splice(index, 1);
                                        }
                                        bgmAudioInfos[i].isPlaying = false;
                                    }
                                    if (bgmAudioInfos[i].barElement) {
                                        bgmAudioInfos[i].barElement.remove();
                                    }
                                    bgmAudioInfos[i] = null;
                                }
                            }
                            
                            // タイマーをリセット
                            bgmStartMinutes.value = 0;
                            bgmStartSeconds.value = 0;
                            
                            // BGMをセットアップ
                            bgmAudioInfos[bgmIndex] = setupBGM(bgmFiles[bgmIndex], file.name, bgmIndex);
                            alert(`BGM ${bgmIndex + 1} として「${file.name}」を読み込みました。`);
                        } catch (error) {
                            const msg = logError('ドラッグ&ドロップ BGM処理エラー', error);
                            alert('BGMファイルの処理に失敗しました:\n' + error.message);
                        }
                    }
                }
            });
            
            debugLog('Drag and drop listeners initialized');
        }

        // イベントリスナー設定関数
        function setupEventListeners() {

            let currentMemoIndex = null;

            document.querySelectorAll('.memo-button').forEach((button) => {
                button.addEventListener('click', function() {

                        currentMemoIndex = parseInt(bgmIndex);
                        document.getElementById('memoTitle').textContent = `BGM ${currentMemoIndex + 1} のメモ`;
                    } else {
                        currentMemoType = 'se';
                        currentMemoIndex = seNum;
                        document.getElementById('memoTitle').textContent = `効果音${currentMemoIndex} のメモ`;
                    }
                    
                    document.getElementById('memoText').value = (currentMemoType === 'bgm' ? bgmMemos[currentMemoIndex] : seMemos[currentMemoIndex]) || '';
                    document.getElementById('memoModal').classList.add('show');
                });
            });

            // メモ保存ボタン
            document.getElementById('memoSaveBtn').addEventListener('click', () => {

                    bgmMemos[currentMemoIndex] = memoText;
                } else {
                    seMemos[currentMemoIndex] = memoText;

            });

            document.getElementById('memoModal').addEventListener('click', (e) => {

                    currentMemoIndex = null;
                }

            // BGMファイル入力
            document.querySelectorAll('.bgm-file').forEach((input) => {
                input.addEventListener('change', function(event) {

                    if (!file) {
                        debugLog('BGM file selection cancelled');
                        return;
                    }

                    // ファイル形式チェック
                    const fileExtension = file.name.split('.').pop().toLowerCase();
                    const validFormats = ['mp3', 'wav', 'm4a', 'ogg', 'aac', 'flac'];
                    const nonRecommendedFormats = ['ogg', 'flac'];
                    
                    if (!validFormats.includes(fileExtension)) {
                        alert('サポートされていない音声形式です。MP3、WAV、M4A、OGGなどをお試しください。');
                        this.value = '';
                        return;
                    }
                    
                    // Safari非推奨フォーマット警告
                    if (detectSafariEnvironment().isSafari && nonRecommendedFormats.includes(fileExtension)) {
                        const warning = `⚠️ 音声形式互換性警告\n\n` +
                            `選択されたファイル形式 (${fileExtension.toUpperCase()}) は、` +
                            `iPad Safari での再生がサポートされていない可能性があります。\n\n` +
                            `推奨形式: MP3, WAV, M4A, AAC`;
                        debugLog('Safari non-recommended format warning', { fileExtension, fileName: file.name });
                        alert(warning);
                    }
                    
                    // ファイルサイズチェック
                    const fileSizeGB = file.size / (1024 * 1024 * 1024);
                    if (file.size > 100 * 1024 * 1024) {  // 100MB制限
                        alert('ファイルが大きすぎます。100MB以下の音声ファイルを使用してください。');
                        this.value = '';
                        return;
                    }
                    
                    // ファイルサイズ警告 (50MB以上)

                        debugLog('Large file warning', { fileName: file.name, sizeMB: (file.size / (1024 * 1024)).toFixed(1) });
                        const shouldContinue = confirm(
                            `⚠️ ファイルサイズが大きいです\n\n` +
                            `ファイルサイズ: ${(file.size / (1024 * 1024)).toFixed(1)} MB\n\n` +
                            `iPad や低スペック環境ではデコード失敗の可能性があります。\n\n` +
                            `続けますか?`
                        );
                        if (!shouldContinue) {
                            this.value = '';
                            return;
                        }
                    }

                    try {
                        debugLog('BGM file selected', {bgmIndex, name: file.name, size: file.size, type: file.type, extension: fileExtension});
                        
                        bgmFiles[bgmIndex] = URL.createObjectURL(file);

                        // 選択されたファイルを自動でタイムラインに配置
                        // 他のBGMを停止
                        for (let i = 0; i < 2; i++) {
                            if (i !== bgmIndex && bgmAudioInfos[i]) {
                                // 再生中であれば停止
                                if (bgmAudioInfos[i].sourceNode) {
                                    try {
                                        bgmAudioInfos[i].sourceNode.stop();
                                    } catch (e) {}
                                    bgmAudioInfos[i].autoLoopEnabled = false;  // BGM選択時は自動ループを無効化
                                    const index = playingAudios.indexOf(bgmAudioInfos[i]);
                                    if (index > -1) {
                                        playingAudios.splice(index, 1);
                                    }
                                    bgmAudioInfos[i].isPlaying = false;
                                }
                                // タイムライン上のバーを削除
                                if (bgmAudioInfos[i].barElement) {
                                    bgmAudioInfos[i].barElement.remove();
                                }
                                bgmAudioInfos[i] = null;
                            }
                        }
                        // タイマーをリセット
                        bgmStartMinutes.value = 0;
                        bgmStartSeconds.value = 0;
                        bgmAudioInfos[bgmIndex] = setupBGM(bgmFiles[bgmIndex], file.name, bgmIndex);
                    } catch (error) {
                        const msg = logError('BGMファイル処理エラー', error);
                        alert('音声ファイルの処理に失敗しました:\n' + error.message);
                    }
                });
            });

            // BGMボタン（選択）
            document.querySelectorAll('.bgm-button').forEach((button) => {
                button.addEventListener('click', function() {
                    const bgmIndex = parseInt(this.dataset.bgm);
                    const fileInput = document.querySelector(`.bgm-file[data-bgm="${bgmIndex}"]`);
                    const fileUrl = bgmFiles[bgmIndex];
                    
                    try {
                        // ファイルがまだ選択されていない場合はファイル選択ダイアログを開く
                        if (!fileUrl) {
                            if (fileInput) {
                                debugLog('Opening file picker for BGM', {bgmIndex});
                                fileInput.click();
                            }
                        } else {
                            debugLog('BGM button clicked with existing file', {bgmIndex});
                            // ファイルが既に選択されている場合は、BGMをセットアップ
                            // すべてのBGMを停止（選択されたBGMも含む）
                            for (let i = 0; i < 2; i++) {
                                if (bgmAudioInfos[i]) {
                                    // 再生中であれば停止
                                    if (bgmAudioInfos[i].sourceNode) {
                                        try {
                                            bgmAudioInfos[i].sourceNode.stop();
                                    } catch (e) {}
                                    bgmAudioInfos[i].autoLoopEnabled = false;  // BGM選択時は自動ループを無効化
                                    const index = playingAudios.indexOf(bgmAudioInfos[i]);
                                    if (index > -1) {
                                        playingAudios.splice(index, 1);
                                    }
                                    bgmAudioInfos[i].isPlaying = false;
                                }
                                // タイムライン上のバーを削除
                                if (bgmAudioInfos[i].barElement) {
                                    bgmAudioInfos[i].barElement.remove();
                                }
                                bgmAudioInfos[i] = null;
                            }
                        }
                        // タイマーをリセット
                        bgmStartMinutes.value = 0;
                        bgmStartSeconds.value = 0;
                        const audioInfo = setupBGM(fileUrl, this.textContent, bgmIndex);
                        if (audioInfo) {
                            bgmAudioInfos[bgmIndex] = audioInfo;
                        } else {
                            alert('BGMファイルのセットアップに失敗しました。ファイルが有効な音声ファイルか確認してください。');
                        }
                        }
                    } catch (error) {
                        const msg = logError('BGM処理エラー', error);
                        alert('BGMの処理に失敗しました:\n' + error.message);
                    }
                });
            });

            // 効果音ファイル入力
            document.querySelectorAll('.se-file').forEach((input) => {
                input.addEventListener('change', function(event) {
                    const file = event.target.files[0];
                    const seNum = this.dataset.se;
                    
                    if (!file) {
                        debugLog('SE file selection cancelled', {seNum});
                        return;
                    }

                    // ファイル形式チェック
                    const fileExtension = file.name.split('.').pop().toLowerCase();
                    const validFormats = ['mp3', 'wav', 'm4a', 'ogg', 'aac', 'flac'];
                    const nonRecommendedFormats = ['ogg', 'flac'];
                    
                    if (!validFormats.includes(fileExtension)) {
                        alert('サポートされていない音声形式です。MP3、WAV、M4A、OGGなどをお試しください。');
                        this.value = '';
                        return;
                    }
                    
                    // Safari非推奨フォーマット警告
                    if (detectSafariEnvironment().isSafari && nonRecommendedFormats.includes(fileExtension)) {
                        const warning = `⚠️ 音声形式互換性警告\n\n` +
                            `選択されたファイル形式 (${fileExtension.toUpperCase()}) は、` +
                            `iPad Safari での再生がサポートされていない可能性があります。\n\n` +
                            `推奨形式: MP3, WAV, M4A, AAC`;
                        debugLog('Safari non-recommended format warning (SE)', { fileExtension, fileName: file.name, seNum });
                        alert(warning);
                    }

                    // ファイルサイズチェック
                    if (file.size > 50 * 1024 * 1024) {  // 50MB制限
                        alert('ファイルが大きすぎます。50MB以下の音声ファイルを使用してください。');
                        this.value = '';
                        return;
                    }
                    
                    // ファイルサイズ警告 (30MB以上)
                    if (file.size > 30 * 1024 * 1024) {
                        debugLog('Large SE file warning', { fileName: file.name, sizeMB: (file.size / (1024 * 1024)).toFixed(1), seNum });
                        const shouldContinue = confirm(
                            `⚠️ 効果音ファイルサイズが大きいです\n\n` +
                            `ファイルサイズ: ${(file.size / (1024 * 1024)).toFixed(1)} MB\n\n` +
                            `iPad や低スペック環境ではデコード失敗の可能性があります。\n\n` +
                            `続けますか?`
                        );
                        if (!shouldContinue) {
                            this.value = '';
                            return;
                        }
                    }

                    try {
                        debugLog('SE file selected', {seNum, name: file.name, size: file.size, type: file.type, extension: fileExtension});
                        
                        seFiles[seNum] = URL.createObjectURL(file);
                        seFileObjects[seNum] = file;  // File オブジェクトを保持
                        seNames[seNum] = file.name;
                        const buttonElement = document.querySelector(`.se-button[data-se="${seNum}"]`);
                        buttonElement.textContent = file.name;
                    } catch (error) {
                        const msg = logError('SE ファイル処理エラー', error);
                        alert('音声ファイルの処理に失敗しました:\n' + error.message);
                    }
                });
            });

            // 効果音ボタン（再生）
            document.querySelectorAll('.se-button').forEach((button) => {
                button.addEventListener('click', function() {
                    const seNum = this.dataset.se;
                    const fileUrl = seFiles[seNum];
                    
                    if (!fileUrl) {
                        alert('効果音ファイルが選択されていません。ファイルを選択してから再生してください。');
                        return;
                    }

                    try {
                        debugLog('Playing SE', {seNum, fileName: this.textContent});
                        playAudio(fileUrl, this.textContent, 'se', seNum);
                    } catch (error) {
                        const msg = logError('SE再生エラー', error);
                        alert('効果音の再生に失敗しました:\n' + error.message);
                    }
                });
            });

            // 効果音停止ボタン（すべての効果音を止める）

            if (stopAllSeBtnNew) {
                stopAllSeBtnNew.addEventListener('click', function() {
                    // playingAudios配列をコピーしてループ（配列の変更による問題を避けるため）
                    const audiosCopy = [...playingAudios];
                    audiosCopy.forEach((audioInfo) => {
                        if (audioInfo && audioInfo.type === 'se' && audioInfo.isPlaying && audioInfo.sourceNode) {
                            try {
                                audioInfo.sourceNode.stop();
                            } catch (e) {}
                            
                            audioInfo.isPlaying = false;
                            const index = playingAudios.indexOf(audioInfo);
                            if (index > -1) {
                                playingAudios.splice(index, 1);

                            if (audioInfo.barElement) {
                                audioInfo.barElement.remove();
                            }

                });

                }
            });

            // BGM 音程スライダー
            bgmPitchSlider.addEventListener('input', (e) => {
                const sliderValue = parseFloat(e.target.value);
                bgmPitch = sliderValue / 100;
                bgmPitchValue.textContent = e.target.value;
                
                // スライダー値 50～200 を cents -1200～+1200 に変換
                // 50% → -1200 cents（1オクターブ下げる）
                // 100% → 0 cents（通常）
                // 200% → +1200 cents（1オクターブ上げる）
                const bgmDetuneAmount = (sliderValue - 100) * 1200 / 100;
                
                // 現在再生中のBGMのdetuneを更新（再生速度は1.0で固定）
                for (let i = 0; i < 2; i++) {
                    const audioInfo = bgmAudioInfos[i];
                    if (audioInfo && audioInfo.sourceNode && audioInfo.isPlaying) {
                        audioInfo.sourceNode.detune.value = bgmDetuneAmount;
                    }
                }
            });

            bgmStartMinutes.addEventListener('change', (e) => {

                // 最小値は0、最大値は999
                if (value < 0) value = 0;
                if (value > 999) value = 999;
                bgmStartMinutes.value = value;
            });

            bgmStartSeconds.addEventListener('change', (e) => {
                let value = parseInt(e.target.value) || 0;
                // 秒は0-59の範囲で制限
                if (value < 0) value = 0;
                if (value > 59) value = 59;
                bgmStartSeconds.value = value;
            });

            // 秒の入力時にEnterキーで再生を開始
            bgmStartSeconds.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    playBtn.click();
                }
            });

            // 効果音 音量スライダー

                    seGainNode.gain.value = seVolume;
