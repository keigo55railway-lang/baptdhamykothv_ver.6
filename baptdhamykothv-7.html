                // チェックされている効果音のみに音量を適用
                playingAudios.forEach((audioInfo) => {
                    if (audioInfo.type === 'se' && audioInfo.sourceNode && audioInfo.isPlaying) {
                        const seNum = audioInfo.seNum;
                        if (seEnabled[seNum]) {
                            audioInfo.sourceNode.gain.value = seVolume;
                        }
                    }
                });
            });

            // 効果音 音程スライダー
            sePitchSlider.addEventListener('input', (e) => {
                const sliderValue = parseFloat(e.target.value);
                sePitch = sliderValue / 100;
                sePitchValue.textContent = e.target.value;
                
                // スライダー値 50～200 を cents -1200～+1200 に変換
                // 50% → -1200 cents（1オクターブ下げる）
                // 100% → 0 cents（通常）
                // 200% → +1200 cents（1オクターブ上げる）
                detuneAmount = (sliderValue - 100) * 1200 / 100;
                
                // チェックされている効果音のみに音程を更新（再生速度は1.0で固定）
                playingAudios.forEach((audioInfo) => {
                    if (audioInfo.type === 'se' && audioInfo.sourceNode && audioInfo.isPlaying) {
                        const seNum = audioInfo.seNum;
                        if (seEnabled[seNum]) {
                            audioInfo.sourceNode.detune.value = detuneAmount;
                        }
                    }
                });
            });

            // 効果音チェックボックス
            document.querySelectorAll('.se-checkbox').forEach((checkbox) => {
                checkbox.addEventListener('change', (e) => {
                    const seNum = parseInt(e.target.dataset.se);
                    seEnabled[seNum] = e.target.checked;
                    
                    // ===== チェック状態をページデータに即座に保存
                    saveCheckStateToCurrentPage();
                    
                    // 再生中のこの効果音の音量と音程を更新
                    playingAudios.forEach((audioInfo) => {
                        if (audioInfo.type === 'se' && audioInfo.seNum === seNum && audioInfo.isPlaying) {
                            if (e.target.checked) {
                                // チェック入った：スライダー値を適用
                                if (audioInfo.sourceNode && audioInfo.sourceNode.gain) {
                                    audioInfo.sourceNode.gain.value = seVolume;
                                    const detuneValue = (sePitchSlider.value - 100) * 1200 / 100;
                                    audioInfo.sourceNode.detune.value = detuneValue;
                                }
                                if (audioInfo.audioElement) {
                                    audioInfo.audioElement.volume = seVolume;
                                }
                            } else {
                                // チェック外れた：100%に強制
                                if (audioInfo.sourceNode && audioInfo.sourceNode.gain) {
                                    audioInfo.sourceNode.gain.value = 1.0;
                                    audioInfo.sourceNode.detune.value = 0;
                                }
                                if (audioInfo.audioElement) {
                                    audioInfo.audioElement.volume = 1.0;
                                }
                            }
                        }
                    });
                });
            });
        }

        // BGMをセットアップする関数（タイムラインに表示、再生はしない）
        function setupBGM(fileUrl, fileName, bgmIndex) {
            debugLog('setupBGM called', {fileName, bgmIndex, urlType: fileUrl.startsWith('blob:') ? 'blob' : 'other'});
            
            // Web Audio Context初期化（一本化版）
            if (!initAudioContext()) {
                logError('setupBGM', 'AudioContext初期化失敗');
                return null;
            }

            const audioInfo = {
                sourceNode: null,
                oscillatorNode: null,
                buffer: null,
                blobUrl: null,
                startTime: null,
                duration: null,
                fileName: fileName,
                type: 'bgm',
                barElement: null,
                bgmIndex: bgmIndex,
                isSetup: true,
                isPlaying: false,
                pauseTime: 0,
                audioData: null,
                autoLoopEnabled: false,
                playbackMethod: 'unknown'
            };

            // GitHub Pages対応: blob URLのハンドリングを改善
            getBlobArrayBuffer(fileUrl)
                .then(arrayBuffer => {
                    debugLog('BGM ArrayBuffer取得成功', {
                        fileName: fileName,
                        size: arrayBuffer.byteLength,
                        sizeKB: (arrayBuffer.byteLength / 1024).toFixed(2)
                    });
                    
                    // デコード or フォールバック
                    playAudioWithFallback(arrayBuffer, fileName, 'audio/mpeg')
                        .then((result) => {
                            debugLog('BGM playAudioWithFallback result', {
                                fileName: fileName,
                                method: result.method,
                                status: result.status,
                                duration: result.duration
                            });
                            
                            audioInfo.buffer = result.buffer || null;
                            audioInfo.blobUrl = result.blobUrl || null;
                            audioInfo.playbackMethod = result.method;
                            
                            if (result.buffer) {
                                audioInfo.duration = result.buffer.duration;
                                audioBuffers[bgmIndex] = result.buffer;
                                maxDuration = Math.max(maxDuration, audioInfo.duration);
                                timelineMaxDuration = Math.max(30, Math.ceil(audioInfo.duration));
                                generateRuler();
                                createAudioBar(audioInfo);
                                bgmInfo.textContent = `BGM: ${fileName} (${result.method}, 準備完了)`;
                                debugLog('BGM setup complete (WebAudio)', {
                                    fileName: fileName, 
                                    duration: result.duration,
                                    sampleRate: result.sampleRate,
                                    channels: result.channels
                                });
                            } else if (result.blobUrl) {
                                audioInfo.duration = 0;  // HTMLAudioではduration不明
                                bgmInfo.textContent = `BGM: ${fileName} (HTMLAudioElement fallback, 準備完了)`;
                                debugLog('BGM setup complete (HTMLAudio)', { fileName: fileName });
                            }
                        })
                        .catch(error => {
                            const explanation = getSafariErrorExplanation(error.name || 'UnknownError');
                            logError(`BGMセットアップ失敗（${explanation.title}）`, error);
                            bgmInfo.textContent = `BGM: ${explanation.title}`;
                            alert(`${explanation.title}\\n\\n${explanation.solution}`);
                        });
                })
                .catch(error => {
                    const msg = logError('BGMファイル読込エラー', error);
                    debugLog('BGM loading failure details', {
                        fileName: fileName,
                        urlType: fileUrl.startsWith('blob:') ? 'blob' : 'other',
                        error: error.message
                    });
                    const explanation = getSafariErrorExplanation('SecurityError');
                    bgmInfo.textContent = `BGM: ${explanation.title}`;
                    alert(`${explanation.title}\\n\\n${explanation.solution}`);
                });

            updateTimeline();
            return audioInfo;
        }

        // 音声を再生する関数
        function playBGM(fileUrl, fileName, bgmIndex) {
            const audio = document.createElement('audio');
            audio.src = fileUrl;
            audioContainer.appendChild(audio);

            const audioInfo = {
                element: audio,
                startTime: null,
                duration: null,
                fileName: fileName,
                type: 'bgm',
                barElement: null,
                bgmIndex: bgmIndex
            };

            // メタデータがロードされたら、タイムラインに追加
            audio.addEventListener('loadedmetadata', function() {
                audioInfo.duration = audio.duration;
                maxDuration = Math.max(maxDuration, audio.duration);
                // BGMの長さに合わせてタイムラインを更新（最小30秒を保証）
                timelineMaxDuration = Math.max(30, Math.ceil(audio.duration));
                generateRuler();
                createAudioBar(audioInfo);
            });

            // 音声終了時にタイムラインから削除、最初に戻す
            audio.addEventListener('ended', function() {
                playingAudios.splice(playingAudios.indexOf(audioInfo), 1);
                if (audioInfo.barElement) {
                    audioInfo.barElement.remove();
                }
                audio.currentTime = 0;
                audio.remove();
                bgmAudioInfos[bgmIndex] = null;
                playBtn.style.display = 'block';
                pauseBtn.style.display = 'none';
                bgmInfo.textContent = 'BGM: 準備中...';
            });

            playingAudios.push(audioInfo);
            audio.play();
            updateTimeline();
            
            return audioInfo;
        }

        // 音声を再生する関数
        function playAudio(fileUrl, fileName, type, seNum = null) {
            debugLog('playAudio called', {
                fileName: fileName,
                type: type,
                seNum: seNum,
                urlType: fileUrl.startsWith('blob:') ? 'blob' : 'other',
                audioContextState: audioContext?.state
            });
            
            // Web Audio Context初期化
            if (!initAudioContext()) {
                alert('オーディオ機能を初期化できませんでした。別のブラウザをお試しください。');
                return null;
            }

            // 効果音ボタンが押された時点のBGM時刻を記録
            let startBgmTime = 0;
            for (let i = 0; i < 2; i++) {
                const audioInfo = bgmAudioInfos[i];
                if (audioInfo && audioInfo.isPlaying && audioInfo.sourceNode) {
                    const elapsedTime = audioContext.currentTime - audioInfo.startTime;
                    startBgmTime = audioInfo.pauseTime + elapsedTime;
                    break;
                }
            }

            const audioInfo = {
                buffer: null,
                blobUrl: null,
                sourceNode: null,
                oscillatorNode: null,
                startTime: null,
                duration: null,
                fileName: fileName,
                type: type,
                seNum: seNum,
                barElement: null,
                startBgmTime: startBgmTime,
                isPlaying: false,
                playbackMethod: 'unknown'
            };

            // GitHub Pages対応: blob URLのハンドリングを改善
            getBlobArrayBuffer(fileUrl)
                .then(arrayBuffer => {
                    debugLog('SE ArrayBuffer取得成功', {
                        fileName: fileName,
                        size: arrayBuffer.byteLength,
                        sizeKB: (arrayBuffer.byteLength / 1024).toFixed(2)
                    });
                    
                    // デコード or フォールバック再生
                    playAudioWithFallback(arrayBuffer, fileName, type, 0, detuneAmount)
                        .then((result) => {
                            debugLog('playAudioWithFallback result', {
                                fileName: fileName,
                                method: result.method,
                                status: result.status,
                                duration: result.duration
                            });
                            
                            audioInfo.buffer = result.buffer || null;
                            audioInfo.blobUrl = result.blobUrl || null;
                            audioInfo.playbackMethod = result.method;
                            audioInfo.duration = result.duration || 0;
                            maxDuration = Math.max(maxDuration, audioInfo.duration);
                            
                            // Web Audio 再生
                            if (result.buffer && result.method === 'WebAudio') {
                                playAudioBuffer(audioInfo);
                            }
                            // HTMLAudio フォールバック
                            else if (result.blobUrl && result.method === 'HTMLAudioElement') {
                                debugLog('Playing SE via HTMLAudioElement', {
                                    fileName: fileName,
                                    blobUrlLength: result.blobUrl.length
                                });
                                
                                try {
                                    const audio = new Audio();
                                    audio.src = result.blobUrl;
                                    
                                    // チェック状態に応じて音量を決定
                                    let effectiveVolume = seGainNode.gain.value;
                                    if (info.seNum && !seEnabled[info.seNum]) {
                                        // チェックが外れている場合は100%に強制
                                        effectiveVolume = 1.0;
                                    }
                                    audio.volume = effectiveVolume;
                                    audioContainer.appendChild(audio);
                                    
                                    // audioInfoにaudioElementを保存（チェック状態変更時の更新用）
                                    info.audioElement = audio;
                                    
                                    audio.play().catch(err => {
                                        logError('HTMLAudio play failed', err);
                                        debugLog('HTMLAudio play error', {
                                            fileName: fileName,
                                            error: err.message
                                        });
                                    });
                                    
                                    audio.addEventListener('ended', () => {
                                        debugLog('HTMLAudio ended', { fileName });
                                        audio.remove();
                                    });
                                    
                                    audioInfo.isPlaying = true;
                                } catch (e) {
                                    const explanation = getSafariErrorExplanation(e.name || 'UnknownError');
                                    logError('HTMLAudio作成エラー', e);
                                    alert(`${explanation.title}\\n\\n${explanation.solution}`);
                                }
                            }
                        })
                        .catch(error => {
                            const explanation = getSafariErrorExplanation(error.name || 'UnknownError');
                            logError(`SE再生失敗（${explanation.title}）`, error);
                            alert(`${explanation.title}\\n\\n${explanation.solution}`);
                        });
                })
                .catch(error => {
                    const msg = logError('SEファイル読込エラー', error);
                    debugLog('SE loading failure details', {
                        fileName: fileName,
                        urlType: fileUrl.startsWith('blob:') ? 'blob' : 'other',
                        error: error.message
                    });
                    const explanation = getSafariErrorExplanation('SecurityError');  // CORS/ネットワークエラー
                    alert(`${explanation.title}\\n\\n${explanation.solution}`);
                });

            playingAudios.push(audioInfo);
            updateTimeline();

            function playAudioBuffer(info) {
                debugLog('playAudioBuffer called', {
                    fileName: info.fileName,
                    bufferDuration: info.buffer?.duration,
                    audioContextState: audioContext?.state,
                    playbackMethod: info.playbackMethod || 'WebAudio'
                });
                
                async function doPlayAudio() {
                    try {
                        // AudioContext状態の最終確認
                        if (!audioContext || audioContext.state === 'closed') {
                            logError('playAudioBuffer', 'AudioContextが閉じられています');
                            alert('音声再生の初期化に失敗しました。ページをリロードしてください。');
                            return;
                        }
                        
                        // resume待機（最大3秒）
                        let resumeAttempts = 0;
                        while (audioContext.state === 'suspended' && resumeAttempts < 30) {
                            try {
                                await audioContext.resume();
                                debugLog('AudioContext resumed in playAudioBuffer', { 
                                    attempt: resumeAttempts,
                                    finalState: audioContext.state 
                                });
                            } catch (err) {
                                resumeAttempts++;
                                await new Promise(r => setTimeout(r, 100));  // 100ms待機
                            }
                        }
                        
                        // state === "running" までの最終確認
                        if (audioContext.state !== 'running') {
                            const explanation = getSafariErrorExplanation('InvalidStateError');
                            logError('AudioContext state invalid', new Error(`state: ${audioContext.state}`));
                            alert(`${explanation.title}\\n\\n${explanation.solution}`);
                            debugLog('AudioContext state still not running', { 
                                state: audioContext.state,
                                sampleRate: audioContext.sampleRate
                            });
                            return;
                        }
                        
                        debugLog('doPlayAudio executing', {
                            fileName: info.fileName,
                            seVolume: seVolume,
                            seGainNodeValue: seGainNode?.gain.value,
                            audioContextState: audioContext.state,
                            audioContextCurrentTime: audioContext.currentTime
                        });
                        
                        try {
                            const source = audioContext.createBufferSource();
                            source.buffer = info.buffer;
                            
                            source.playbackRate.value = 1.0;
                            
                            // チェック状態に応じてデチューン値を決定
                            let effectiveDetune = detuneAmount;
                            if (info.seNum && !seEnabled[info.seNum]) {
                                // チェックが外れている場合は100%に強制
                                effectiveDetune = 0;
                            }
                            
                            // detune値の安全化
                            const safeDetune = sanitizeDetuneValue(effectiveDetune);
                            source.detune.value = safeDetune;

                            source.connect(seGainNode);

                            info.sourceNode = source;
                            info.oscillatorNode = null;
                            info.startTime = audioContext.currentTime;
                            info.isPlaying = true;
                            info.playbackMethod = 'WebAudio';

                            debugLog('SE source started', {
                                fileName: info.fileName,
                                audioContextState: audioContext.state,
                                seGainValue: seGainNode.gain.value,
                                playbackRate: source.playbackRate.value,
                                detune: safeDetune,
                                currentTime: audioContext.currentTime
                            });

                            source.start();

                            createAudioBar(info);
                            startSEAnimation();  // アニメーション開始

                            source.onended = function() {
                                debugLog('SE playback ended', {fileName: info.fileName});
                                const index = playingAudios.indexOf(info);
                                if (index > -1) {
                                    playingAudios.splice(index, 1);
                                }
                                if (info.barElement) {
                                    info.barElement.remove();
                                }
                                info.isPlaying = false;
                            };
                        } catch (e) {
                            const errorExp = getSafariErrorExplanation(e.name || 'UnknownError', e.code);
                            const msg = logError(`SE再生エラー（${errorExp.title}）`, e);
                            debugLog('doPlayAudio execute error', {
                                error: e.message,
                                errorName: e.name,
                                errorCode: e.code,
                                explanation: errorExp.description
                            });
                            alert(`${errorExp.title}\\n\\n${errorExp.solution}`);
                        }
                    } catch (e) {
                        logError('playAudioBuffer async error', e);
                        const errorExp = getSafariErrorExplanation(e.name || 'UnknownError', e.code);
                        alert(`再生準備エラー\\n\\n${errorExp.solution}`);
                    }
                }
                
                // 非同期で再生開始
                doPlayAudio();
            }
        }

        // タイムラインにバーを作成
        function createAudioBar(audioInfo) {
            const bar = document.createElement('div');
            bar.className = `audio-bar ${audioInfo.type} playing`;
            bar.textContent = audioInfo.fileName;
            
            // 効果音の場合、アニメーション対応の配置
            if (audioInfo.type === 'se' && audioContext) {
                // SE開始時刻を記録（AudioContext.currentTime）
                audioInfo.seStartTime = audioContext.currentTime;
                
                // 初期位置：SE開始時のAudioContext時刻に基づいて配置
                bar.style.left = '0px';  // 開始位置は 0 から
                
                // 効果音の長さに応じてバーの幅を設定
                if (audioInfo.duration) {
                    const width = audioInfo.duration * pixelsPerSecond;
                    bar.style.width = width + 'px';
                }
            }
            
            timelineCanvas.appendChild(bar);
            audioInfo.barElement = bar;
            
            // SE再生時、アニメーションループを開始
            if (audioInfo.type === 'se' && playingAudios.length > 0) {
                updateSEBars();
            }
        }

        // SE バーのリアルタイム更新関数
        let seAnimationLoopActive = false;
        function updateSEBars() {
            // SE バー位置をリアルタイム更新
            playingAudios.forEach(audio => {
                if (audio.barElement && audio.seStartTime !== undefined && audioContext) {
                    // 現在の再生進行時間（秒）
                    const elapsedTime = audioContext.currentTime - audio.seStartTime;
                    // タイムライン上の左位置（pixels）
                    const left = Math.max(0, elapsedTime * pixelsPerSecond);
                    audio.barElement.style.left = left + 'px';
                }
            });
            
            // SE再生中の場合、次フレームで更新
            if (playingAudios.length > 0) {
                seAnimationLoopActive = true;
                requestAnimationFrame(updateSEBars);
            } else {
                seAnimationLoopActive = false;
            }
        }
        
        // SE アニメーション開始関数
        function startSEAnimation() {
            if (!seAnimationLoopActive && playingAudios.length > 0) {
                seAnimationLoopActive = true;
                updateSEBars();
            }
        }

        // タイムラインを更新
        // ===== 診断パネル更新（新規） =====
        function updateDiagnosticPanel() {
            const detailDiagnostics = document.getElementById('detailDiagnostics');
            if (!detailDiagnostics) return;
            
            let content = '<strong>== 音声システム状態 ==</strong><br>';
            
            // AudioContext情報
            if (audioContext) {
                content += `AudioContext: ${audioContext.state} (${audioContext.sampleRate} Hz)<br>`;
                content += `再生位置: ${audioContext.currentTime.toFixed(2)}s<br>`;
            } else {
                content += 'AudioContext: 未初期化<br>';
            }
            
            // BGM情報
            content += '<strong>== BGM ==</strong><br>';
            for (let i = 0; i < 2; i++) {
                const bgm = bgmAudioInfos[i];
                if (bgm && bgm.buffer) {
                    const playing = bgm.isPlaying ? '再生中' : '停止';
                    const method = bgm.playbackMethod || 'WebAudio';
                    content += `BGM${i + 1}: ${bgm.fileName} (${method}) - ${playing} - ${bgm.duration?.toFixed(1)}s<br>`;
                } else if (bgm && bgm.blobUrl) {
                    const method = bgm.playbackMethod || 'HTMLAudioElement';
                    content += `BGM${i + 1}: ${bgm.fileName} (${method}) - 準備完了<br>`;
                } else {
                    content += `BGM${i + 1}: 未設定<br>`;
                }
            }
            
            // SE情報
            content += '<strong>== SE（効果音）==</strong><br>';
            if (playingAudios.length > 0) {
                playingAudios.forEach((audio, idx) => {
                    const playing = audio.isPlaying ? '再生中' : '準備中';
                    const method = audio.playbackMethod || 'unknown';
                    const detune = audio.buffer ? `(detune: ${sanitizeDetuneValue(detuneAmount)}c)` : '';
                    content += `SE: ${audio.fileName} (${method}) - ${playing} ${detune}<br>`;
                });
            } else {
                content += 'SE: なし<br>';
            }
            
            // ブラウザ情報
            content += '<strong>== 環境 ==</strong><br>';
            const browserInfo = getBrowserInfo();
            const safariEnv = detectSafariEnvironment();
            content += `ブラウザ: ${browserInfo.browser}<br>`;
            content += `Safari: ${safariEnv.isSafari ? 'Yes' : 'No'} | iPad: ${safariEnv.isIPad ? 'Yes' : 'No'}<br>`;
            
            detailDiagnostics.innerHTML = content;
        }
        
        // 診断パネルの定期更新
        setInterval(updateDiagnosticPanel, 500);

        function updateTimeline() {
            const containerWidth = timelineCanvas.parentElement.offsetWidth;

            // プログレスバーは固定、ルーラーとキャンバスをスクロール
            let activeBgm = null;
            for (let i = 0; i < 2; i++) {
                if (bgmAudioInfos[i] && bgmAudioInfos[i].duration && bgmAudioInfos[i].isPlaying) {
                    activeBgm = bgmAudioInfos[i];
                    break;
                }
            }

            if (activeBgm) {
                // AudioBufferSourceNodeの再生時刻を計算
                const elapsedTime = audioContext.currentTime - activeBgm.startTime;
                const currentTime = activeBgm.pauseTime + elapsedTime;
                const translateX = containerWidth / 2 - (currentTime * pixelsPerSecond);
                timelineRuler.style.transform = `translateX(${translateX}px)`;
                timelineCanvas.style.transform = `translateX(${translateX}px)`;
            } else {
                const initialTranslateX = containerWidth / 2;
                timelineRuler.style.transform = `translateX(${initialTranslateX}px)`;
                timelineCanvas.style.transform = `translateX(${initialTranslateX}px)`;
            }

            // BGMとSEを異なるトラックに分ける
            let bgmOffset = 5;      // BGMトラック（上）
            let seYOffsets = {};    // SEトラック（下）：SE番号ごとに位置を管理

            playingAudios.forEach((audioInfo) => {
                if (audioInfo.barElement && audioInfo.duration) {
                    const width = Math.max(1, audioInfo.duration * pixelsPerSecond);
                    
                    // BGMと効果音で位置計算を分ける
                    let left = 0;
                    let top = 5;  // デフォルト
                    
                    if (audioInfo.type === 'bgm') {
                        // BGM：固定トラック上部
                        top = bgmOffset;
                    } else if (audioInfo.type === 'se') {
                        // 効果音：記録された開始時刻を基準に位置を固定
                        left = audioInfo.startBgmTime * pixelsPerSecond;
                        // SEトラック：下部に配置
                        top = 35;  // BGMの高さ（15-20px）+ マージン
                    }

                    audioInfo.barElement.style.width = width + 'px';
                    audioInfo.barElement.style.left = left + 'px';
                    audioInfo.barElement.style.top = top + 'px';
                }
            });

            requestAnimationFrame(updateTimeline);
        }

        // 常時タイムラインを更新
        function startAnimationLoop() {
            updateTimeline();
            requestAnimationFrame(startAnimationLoop);
        }

        startAnimationLoop();
    </script>
</body>
</html>
