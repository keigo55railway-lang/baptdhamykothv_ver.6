        // ===== SE有効状態のデフォルト値を取得
        function getDefaultSeEnabledState() {
            return {1: false, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false, 8: false, 9: false, 10: false, 11: false, 12: false};
        }

        // ===== チェックボックス状態を復元
        function restoreCheckboxStates() {
            document.querySelectorAll('.se-checkbox').forEach((checkbox) => {
                const seNum = parseInt(checkbox.dataset.se);
                checkbox.checked = seEnabled[seNum] || false;
            });
        }

        // ===== ページデータにチェック状態を即座に保存
        function saveCheckStateToCurrentPage() {
            if (currentPage >= 1 && currentPage <= MAX_PAGES) {
                pages[currentPage - 1].seEnabled = {...seEnabled};
            }
        }

        // Base64変換ヘルパー関数
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // タイムラインの目盛りを生成（秒数表示）
        function generateRuler() {
            timelineRuler.innerHTML = '';
            const containerWidth = timelineRuler.parentElement.offsetWidth;
            // pixelsPerSecondを固定値として計算（30秒分がコンテナ幅になるように）
            pixelsPerSecond = containerWidth / 30;
            // ルーラーとキャンバスの幅をtimelineMaxDurationに応じて調整
            const rulerWidth = pixelsPerSecond * timelineMaxDuration;
            
            // ルーラーとキャンバスの幅を設定
            timelineRuler.style.width = rulerWidth + 'px';
            timelineCanvas.style.width = rulerWidth + 'px';
            
            for (let i = 0; i <= timelineMaxDuration; i++) {
                const tickElement = document.createElement('div');
                tickElement.className = 'timeline-ruler-tick';
                tickElement.style.left = (i * pixelsPerSecond) + 'px';
                timelineRuler.appendChild(tickElement);

                if (i % 5 === 0) {
                    const label = document.createElement('div');
                    label.className = 'timeline-ruler-label';
                    label.textContent = i + 's';
                    label.style.left = (i * pixelsPerSecond) + 'px';
                    timelineRuler.appendChild(label);
                }
            }

            // 初期状態で赤いバーが0秒に合うようにオフセットを設定
            const initialTranslateX = containerWidth / 2;
            timelineRuler.style.transform = `translateX(${initialTranslateX}px)`;
            timelineCanvas.style.transform = `translateX(${initialTranslateX}px)`;
        }

        window.addEventListener('resize', generateRuler);
        generateRuler();

        // ===== デバッグ・エラーハンドリング機能 =====
        // デバッグモードフラグ
        const DEBUG_MODE = false;  // trueにするとconsoleに詳細ログが出力されます

        // ログ出力関数（デバッグモード対応＋画面表示）
        function debugLog(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] ${message}`;
            
            if (DEBUG_MODE) {
                console.log(logMsg, data || '');
            }
            
            // 画面の診断パネルにも追加
            try {
                const logPanel = document.getElementById('debugLogPanel');
                if (logPanel && logPanel.style.display !== 'none') {
                    const logEntry = document.createElement('div');
                    logEntry.className = 'log-entry';
                    logEntry.textContent = logMsg + (data ? ' ' + JSON.stringify(data).substring(0, 100) : '');
                    logEntry.style.fontSize = '11px';
                    logEntry.style.padding = '2px';
                    logEntry.style.borderBottom = '1px solid #ddd';
                    logPanel.appendChild(logEntry);
                    if (logPanel.children.length > 100) {
                        logPanel.removeChild(logPanel.firstChild);
                    }
                    logPanel.scrollTop = logPanel.scrollHeight;
                }
            } catch (e) {}
        }

        // エラーロギング関数（詳細フィルタリング込み）
        function logError(context, error) {
            // Safari固有のエラー分類
            const errorName = error?.name || 'UnknownError';
            const errorCode = error?.code || 'unknown';
            const errorMessage = error?.message || String(error);
            
            // Safari固有のエラー解説
            let safariExplanation = '';
            const isSafari = detectSafariEnvironment().isSafari;
            
            if (isSafari) {
                if (errorName === 'NotSupportedError') {
                    safariExplanation = ' [Safari: 形式非対応]';
                } else if (errorName === 'InvalidStateError') {
                    safariExplanation = ' [Safari: 状態エラー - AudioContext不正]';
                } else if (errorName === 'EncodingError') {
                    safariExplanation = ' [Safari: デコード失敗]';
                } else if (errorName === 'AbortError') {
                    safariExplanation = ' [Safari: 操作中止]';
                } else if (errorCode === 4) {  // QUOTA_EXCEEDED_ERR
                    safariExplanation = ' [Safari: メモリ不足]';
                }
            }
            
            const errorMsg = `【エラー】${context}: ${errorMessage}${safariExplanation}`;
            const fullError = {
                context: context,
                message: errorMessage,
                name: errorName,
                code: errorCode,
                type: error?.type || 'unknown',
                isSafariError: isSafari,
                timestamp: new Date().toISOString()
            };
            
            console.error(errorMsg, fullError);
            
            // 画面の診断パネルにも追加
            try {
                const errorPanel = document.getElementById('debugErrorPanel');
                if (errorPanel) {
                    const errorEntry = document.createElement('div');
                    errorEntry.className = 'error-entry';
                    errorEntry.textContent = errorMsg + ' (' + errorCode + ')';
                    errorEntry.style.fontSize = '11px';
                    errorEntry.style.padding = '3px';
                    
                    // Safari固有のエラーは色を変更
                    if (isSafari && safariExplanation) {
                        errorEntry.style.backgroundColor = '#ffe0e0';
                        errorEntry.style.color = '#cc0000';
                        errorEntry.style.borderLeft = '3px solid #ff6666';
                    } else {
                        errorEntry.style.backgroundColor = '#ffebee';
                        errorEntry.style.color = '#c62828';
                        errorEntry.style.borderLeft = '3px solid #c62828';
                    }
                    
                    errorEntry.style.marginBottom = '2px';
                    errorPanel.appendChild(errorEntry);
                    if (errorPanel.children.length > 50) {
                        errorPanel.removeChild(errorPanel.firstChild);
                    }
                    errorPanel.scrollTop = errorPanel.scrollHeight;
                }
            } catch (e) {}
            
            return errorMsg;
        }

        // プライベートブラウズモード検出関数
        function isPrivateBrowsingMode() {
            try {
                const test = '__private_test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return false;
            } catch (e) {
                return true;
            }
        }

        // ブラウザ互換性情報取得
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            return {
                isChrome: /Chrome/.test(ua),
                isFirefox: /Firefox/.test(ua),
                isSafari: /Safari/.test(ua) && !/Chrome/.test(ua),
                isEdge: /Edge|Edg/.test(ua),
                isIOS: /iPhone|iPad|iPod/.test(ua),
                isAndroid: /Android/.test(ua),
                isMobile: /iPhone|iPad|iPod|Android|Mobile/.test(ua),
                userAgent: ua
            };
        }

        // ===== GitHub Pages対応: blob URLからArrayBufferを取得する汎用関数 (Safari優先対応) =====
        function getBlobArrayBuffer(blobUrl) {
            return new Promise((resolve, reject) => {
                // ブラウザ判定
                const safari = detectSafariEnvironment();
                debugLog('getBlobArrayBuffer start', { 
                    urlType: blobUrl.startsWith('blob:') ? 'blob' : 'other',
                    isSafari: safari.isSafari,
                    isIOS: safari.isIOS
                });
                
                // Safari優先: FileReader → XMLHttpRequest → fetch の順
                const useFileReaderFirst = safari.isSafari || safari.isIOS;
                
                if (!useFileReaderFirst) {
                    // Desktop / Chrome: fetch → FileReader
                    tryFetch();
                } else {
                    // iPad Safari: FileReader優先
                    tryFileReader();
                }
                
                function tryFileReader() {
                    debugLog('Trying FileReader method');
                    fetch(blobUrl)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`Fetch failed: ${response.status} ${response.statusText}`);
                            }
                            return response.blob();
                        })
                        .then(blob => {
                            const reader = new FileReader();
                            
                            reader.onload = function(e) {
                                debugLog('FileReader succeeded', {
                                    blobSize: blob.size,
                                    bufferSize: e.target.result.byteLength
                                });
                                resolve(e.target.result);
                            };
                            
                            reader.onerror = function(e) {
                                debugLog('FileReader failed, trying XMLHttpRequest', { error: e.error });
                                tryXHR();
                            };
                            
                            reader.readAsArrayBuffer(blob);
                        })
                        .catch(error => {
                            debugLog('Fetch failed, trying XMLHttpRequest', { error: error.message });
                            tryXHR();
                        });
                }
                
                function tryFetch() {
                    debugLog('Trying direct fetch method');
                    fetch(blobUrl)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`Fetch failed: ${response.status}`);
                            }
                            return response.arrayBuffer();
                        })
                        .then(arrayBuffer => {
                            debugLog('Direct fetch succeeded', { bufferSize: arrayBuffer.byteLength });
                            resolve(arrayBuffer);
                        })
                        .catch(error => {
                            debugLog('Fetch failed, trying XMLHttpRequest', { error: error.message });
                            tryXHR();
                        });
                }
                
                function tryXHR() {
                    debugLog('Trying XMLHttpRequest method');
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', blobUrl, true);
                    xhr.responseType = 'arraybuffer';
                    
                    xhr.onload = function() {
                        if (xhr.status === 200 || xhr.status === 0) {
                            debugLog('XMLHttpRequest succeeded', { size: xhr.response.byteLength });
                            resolve(xhr.response);
                        } else {
                            reject(new Error(`XHR failed: ${xhr.status}`));
                        }
                    };
                    
                    xhr.onerror = function() {
                        logError('getBlobArrayBuffer XHR error', new Error('XMLHttpRequest failed'));
                        reject(new Error('XMLHttpRequest failed'));
                    };
                    
                    xhr.ontimeout = function() {
                        reject(new Error('XMLHttpRequest timeout'));
                    };
                    
                    xhr.timeout = 30000;  // 30秒タイムアウト
                    xhr.send();
                }
            });
        }

        // ===== Safari互換性診断関数 =====
        function getSafariDiagnostics() {
            const browserInfo = getBrowserInfo();
            const isIPadSafari = browserInfo.isIOS && browserInfo.isSafari;
            
            return {
                isIPadSafari: isIPadSafari,
                canUseWebAudio: !!(window.AudioContext || window.webkitAudioContext),
                canUseFileReader: typeof FileReader !== 'undefined',
                canUseFetch: typeof fetch !== 'undefined',
                canUseBlob: typeof Blob !== 'undefined',
                canUseObjectURL: !!(window.URL && window.URL.createObjectURL),
                privateMode: isPrivateBrowsingMode(),
                audioFormatsSupported: checkAudioFormatsSupport()
            };
        }

        // ===== オーディオフォーマット対応確認 =====
        function checkAudioFormatsSupport() {
            const audio = document.createElement('audio');
            if (!audio.canPlayType) {
                return {mp3: 'unknown', wav: 'unknown', m4a: 'unknown', ogg: 'unknown'};
            }
            
            return {
                mp3: audio.canPlayType('audio/mpeg') ? 'YES' : 'NO',
                wav: audio.canPlayType('audio/wav') ? 'YES' : 'NO',
                m4a: audio.canPlayType('audio/mp4') ? 'YES' : 'NO',
                ogg: audio.canPlayType('audio/ogg') ? 'YES' : 'NO',
                aac: audio.canPlayType('audio/aac') ? 'YES' : 'NO',
                flac: audio.canPlayType('audio/flac') ? 'YES' : 'NO'
            };
        }

        // ===== Safari検出関数 =====
        function detectSafariEnvironment() {
            const ua = navigator.userAgent;
            return {
                isSafari: /^((?!chrome|android).)*safari/i.test(ua),
                isIPad: /iPad/.test(ua) || (/Mac/.test(ua) && navigator.maxTouchPoints > 4),
                isIOS: /iPhone|iPad|iPod/.test(ua),
                isChromeOnIOS: /iPad|iPhone|iPod/.test(ua) && /Chrome/.test(ua),
                userAgent: ua.substring(0, 100)
            };
        }

        // ===== 再生前セルフチェック =====
        function checkAudioSystem() {
            const issues = [];

            if (!audioContext) {
                issues.push('AudioContext が未初期化です');
            } else {
                if (audioContext.state === 'closed') {
                    issues.push('AudioContext が閉じられています');
                } else if (audioContext.state === 'suspended') {
                    debugLog('AudioContext is suspended - will resume');
                }
                if (!audioContext.destination) {
                    issues.push('AudioContext destination が無効です');
                }
                if (!audioContext.sampleRate) {
                    issues.push('AudioContext sampleRate が無効です');
                }
            }

            if (!gainNode) {
                issues.push('BGM GainNode が未初期化です');
            }
            if (!seGainNode) {
                issues.push('SE GainNode が未初期化です');
            }

            if (bgmVolume === 0 && seVolume === 0) {
                issues.push('BGM/SE 音量が両方0に設定されています');
            }

            if (issues.length > 0) {
                debugLog('Audio system check failed', { issues });
                return { valid: false, issues };
            }

            debugLog('Audio system check passed');
            return { valid: true, issues: [] };
        }
        
        // ===== 再生前包括環境チェック（新規） =====
        function checkPlaybackEnvironment(audioFileInfo) {
            const issues = [];
            const warnings = [];
            
            // AudioContext存在確認
            if (!audioContext) {
                issues.push('AudioContext が未初期化です');
                return { canPlay: false, issues, warnings, method: 'none' };
            }
            
            // AudioContext状態確認
            if (audioContext.state === 'closed') {
                issues.push('AudioContext が閉じられています');
                return { canPlay: false, issues, warnings, method: 'none' };
            }
            
            // GainNode確認
            const targetGainNode = audioFileInfo.type === 'bgm' ? gainNode : seGainNode;
            if (!targetGainNode) {
                issues.push(`${audioFileInfo.type === 'bgm' ? 'BGM' : 'SE'} GainNode が未初期化です`);
                return { canPlay: false, issues, warnings, method: 'none' };
            }
            
            // 音量確認
            if (targetGainNode.gain.value === 0) {
                warnings.push(`${audioFileInfo.type === 'bgm' ? 'BGM' : 'SE'} 音量が 0 に設定されています`);
            }
            
            // 再生方式の判定
            let method = 'none';
            if (audioFileInfo.buffer) {
                method = 'WebAudio';  // decodeAudioData成功
            } else if (audioFileInfo.blobUrl) {
                method = 'HTMLAudio';  // Blob URLあり
            } else {
                issues.push('音声データが未ロードです');
            }
            
            debugLog('Playback environment check', {
                canPlay: issues.length === 0,
                issues,
                warnings,
                method,
                audioContextState: audioContext.state,
                sampleRate: audioContext.sampleRate
            });
            
            return {
                canPlay: issues.length === 0,
                issues,
                warnings,
                method,
                audioContextState: audioContext.state,
                sampleRate: audioContext.sampleRate
            };
        }
        
        // ===== detune値の安全化（新規） =====
        function sanitizeDetuneValue(value) {
            // NaN チェック
            if (isNaN(value)) {
                debugLog('detune NaN detected - reset to 0');
                return 0;
            }
            
            // Infinity チェック
            if (!isFinite(value)) {
                debugLog('detune Infinity detected - reset to 0');
                return 0;
            }
            
            // 範囲制限: -1200 ～ +1200 cents
            const clamped = Math.max(-1200, Math.min(1200, value));
            if (clamped !== value) {
                debugLog('detune clamped', { original: value, clamped });
            }
            
            return clamped;
        }
        
        // ===== Safari エラー詳細説明（新規） =====
        function getSafariErrorExplanation(errorName, errorCode) {
            const explanations = {
                'NotSupportedError': {
                    title: '形式非対応エラー',
                    description: 'この音声形式はこのブラウザでサポートされていません。',
                    solution: 'MP3、WAV、M4A、AAC などの推奨形式をお試しください。'
                },
                'EncodingError': {
                    title: 'デコードエラー',
                    description: '音声データのデコードに失敗しました。',
                    solution: 'ファイルが正しい音声形式か確認してください。大容量ファイルの場合は圧縮を試してください。'
                },
                'InvalidStateError': {
                    title: 'AudioContext状態エラー',
                    description: 'AudioContext の状態が不正です。',
                    solution: 'ページをリロードして再度お試しください。'
                },
                'AbortError': {
                    title: '操作中止エラー',
                    description: '再生操作が中止されました。',
                    solution: '再度再生ボタンを押してください。'
                },
                'SecurityError': {
                    title: 'セキュリティエラー',
                    description: 'CORS または セキュリティポリシーのエラーです。',
                    solution: 'HTTPS環境で実行してください。'
                },
                'QuotaExceededError': {
                    title: 'メモリ不足エラー',
                    description: 'デコード中にメモリが不足しました。',
                    solution: 'より小さいファイルか低ビットレート版をお試しください。'
                }
            };
            
            return explanations[errorName] || {
                title: '不明なエラー',
                description: `エラー: ${errorName}`,
                solution: 'ブラウザを再読み込みしてください。'
            };
        }

        // ===== decodeAudioData失敗時のフォールバック再生（改善版） =====
        async function playAudioWithFallback(arrayBuffer, fileName, type, startTime = 0, detune = 0) {
            debugLog('playAudioWithFallback start', { 
                fileName, 
                type, 
                startTime,
                bufferSize: arrayBuffer.byteLength,
                detune: sanitizeDetuneValue(detune)
            });

            try {
                // 最初にdecodeAudioDataを試みる
                return new Promise((resolve, reject) => {
                    if (!audioContext || audioContext.state === 'closed') {
                        debugLog('AudioContext unavailable for decodeAudioData');
                        // HTMLAudioElement方式へフォールバック: BlobURLを生成
                        try {
                            const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                            const blobUrl = URL.createObjectURL(blob);
                            resolve({ 
                                method: 'HTMLAudioElement', 
                                status: 'AudioContextUnavailable',
                                blobUrl: blobUrl
                            });
                        } catch (blobError) {
                            logError('Blob URL creation failed (AudioContext unavailable)', blobError);
                            resolve({ 
                                method: 'HTMLAudioElement', 
                                status: 'AudioContextUnavailable'
                            });
                        }
                        return;
                    }

                    audioContext.decodeAudioData(
                        arrayBuffer,
                        (buffer) => {
                            debugLog('decodeAudioData success', {
                                fileName,
                                duration: buffer.duration,
                                sampleRate: buffer.sampleRate,
                                numberOfChannels: buffer.numberOfChannels
                            });
                            resolve({ 
                                buffer, 
                                method: 'WebAudio',
                                status: 'success',
                                duration: buffer.duration,
                                sampleRate: buffer.sampleRate,
                                detune: sanitizeDetuneValue(detune)
                            });
                        },
                        (error) => {
                            // Safari: decodeAudioData失敗時のフォールバック
                            const errorExp = getSafariErrorExplanation(error.name || 'UnknownError', error.code);
                            debugLog('decodeAudioData failed - falling back to HTMLAudioElement', {
                                fileName,
                                errorName: error.name,
                                errorMessage: error.message,
                                errorExplanation: errorExp.title,
                                arrayBufferSize: arrayBuffer.byteLength
                            });
                            logError(`デコード失敗（${errorExp.title}）`, error);
                            
                            // HTMLAudioElement方式へフォールバック: BlobURLを生成
                            try {
                                const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                                const blobUrl = URL.createObjectURL(blob);
                                resolve({ 
                                    method: 'HTMLAudioElement',
                                    status: 'decodeFailure',
                                    reason: error.name,
                                    explanation: errorExp,
                                    blobUrl: blobUrl,
                                    duration: 0  // HTMLAudio用は正確な長さが不明
                                });
                            } catch (blobError) {
                                logError('Blob URL creation failed', blobError);
                                resolve({ 
                                    method: 'HTMLAudioElement',
                                    status: 'decodeFailure',
                                    reason: error.name,
                                    explanation: errorExp
                                });
                            }
                        }
                    );
                });
            } catch (error) {
                logError('playAudioWithFallback exception', error);
                // 最後の手段：HTMLAudioElement - BlobURLを生成
                try {
                    const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                    const blobUrl = URL.createObjectURL(blob);
                    return {
                        method: 'HTMLAudioElement',
                        status: 'exceptionFallback',
                        error: error.message,
                        blobUrl: blobUrl
                    };
                } catch (blobError) {
                    logError('Blob URL creation failed (exception fallback)', blobError);
                    return {
                        method: 'HTMLAudioElement',
                        status: 'exceptionFallback',
                        error: error.message
                    };
                }
            }
        }
        
        // ===== HTMLAudioElementフォールバック実装（新規） =====
        function createHTMLAudioElementFallback(arrayBuffer, fileName, type) {
            debugLog('Creating HTMLAudioElement fallback', { fileName, type, size: arrayBuffer.byteLength });
            
            try {
                // ArrayBufferからBlobを作成
                const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                const url = URL.createObjectURL(blob);
                
                // HTMLAudioElementを作成
                const audio = document.createElement('audio');
                audio.src = url;
                audio.style.display = 'none';
                audio.crossOrigin = 'anonymous';
                audioContainer.appendChild(audio);
                
                debugLog('HTMLAudioElement fallback created', { 
                    blobUrl: url.substring(0, 60),
                    blobSize: blob.size
                });
                
                // 再生準備完了イベント
                audio.addEventListener('canplay', () => {
                    debugLog('HTMLAudioElement ready for playback', { fileName, duration: audio.duration });
                }, { once: true });
                
                // エラーハンドラ
                audio.addEventListener('error', (e) => {
                    const errorMsg = `HTMLAudioElement再生エラー: ${audio.error?.message || '不明'}`;
                    logError('HTMLAudioElement error', new Error(audio.error?.message || 'HTMLAudio Error'));
                    debugLog('HTMLAudioElement error details', {
                        fileName,
                        errorCode: audio.error?.code,
                        errorMessage: audio.error?.message,
                        src: url.substring(0, 60)
                    });
                });
                
                // 終了イベント
                audio.addEventListener('ended', () => {
                    debugLog('HTMLAudioElement playback ended', { fileName });
                    audio.remove();
                    URL.revokeObjectURL(url);
                });
                
                return audio;
            } catch (error) {
                logError('HTMLAudioElement creation failed', error);
                debugLog('Fallback creation error', { error: error.message });
                return null;
            }
        }

        // ===== AudioContext初期化関数（ユーザー操作後、常時監視） =====
        function initAudioContext() {
            // AudioContext状態を確認
            if (audioContext) {
                const state = audioContext.state;
                debugLog('AudioContext state check', {
                    exists: true,
                    state: state,
                    sampleRate: audioContext.sampleRate,
                    isClosed: state === 'closed'
                });
                
                if (state === 'closed') {
                    debugLog('AudioContext is closed, creating new one');
                    audioContext = null;  // 閉じたcontextをリセット
                    gainNode = null;
                    seGainNode = null;
                } else if (state === 'running' || state === 'suspended') {
                    return true;  // 既に動作中（suspendedは後でresumeされる）
                }
            }

            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    const msg = logError('AudioContext初期化', 'AudioContextがこのブラウザでサポートされていません');
                    alert(msg);
                    return false;
                }

                audioContext = new AudioContextClass();
                debugLog('AudioContext created', {
                    state: audioContext.state,
                    sampleRate: audioContext.sampleRate,
                    destination: audioContext.destination ? 'available' : 'null',
                    maxChannelCount: audioContext.destination.maxChannelCount
                });

                // BGM用GainNode
                if (!gainNode) {
                    gainNode = audioContext.createGain();
                    // スライダー値から正しい音量を取得（デフォルト100）
                    const bgmSliderValue = parseInt(bgmVolumeSlider.value) || 100;
                    bgmVolume = bgmSliderValue / 100;
                    gainNode.gain.value = bgmVolume;  // 初期音量を設定
                    gainNode.connect(audioContext.destination);
                    debugLog('BGM GainNode created', { value: bgmVolume, sliderValue: bgmSliderValue });
                }

                // 効果音用GainNode
                if (!seGainNode) {
                    seGainNode = audioContext.createGain();
                    // スライダー値から正しい音量を取得（デフォルト100）
                    const seSliderValue = parseInt(seVolumeSlider.value) || 100;
                    seVolume = seSliderValue / 100;
                    seGainNode.gain.value = seVolume;  // 初期音量を設定
                    seGainNode.connect(audioContext.destination);
                    debugLog('SE GainNode created', { value: seVolume, sliderValue: seSliderValue });
                }

                return true;
            } catch (error) {
                logError('AudioContext初期化失敗', error);
                debugLog('AudioContext creation exception', { errorMessage: error.message, errorType: error.type });
                return false;
            }
        }
        
        // AudioContextの状態を監視してresumeを実行（Promiseベース） 
        async function ensureAudioContextRunning() {
            if (!audioContext) {
                const result = initAudioContext();
                if (!result) {
                    debugLog('initAudioContext failed');
                    return false;
                }
            }
            
            const state = audioContext.state;
            debugLog('AudioContext state before ensure', {
                state,
                sampleRate: audioContext.sampleRate
            });
            
            if (state === 'suspended') {
                try {
                    await audioContext.resume();
                    debugLog('AudioContext resumed successfully', { newState: audioContext.state });
                    return true;
                } catch (err) {
                    const msg = logError('AudioContext resume失敗', err);
                    debugLog('Resume error details', { error: err.message, errorType: err.type || err.name });
                    console.error('AudioContext resume失敗:', msg);
                    return false;
                }
            }
            
            if (state === 'running') {
                debugLog('AudioContext already running');
                return true;
            }
            
            if (state === 'closed') {
                debugLog('AudioContext is closed, reinitializing');
                return initAudioContext();
            }
            
            return true;
        }

        // ページ切り替え機能
        function saveCurrentPageData() {
            pages[currentPage - 1] = {
                bgmFiles: [...bgmFiles],
                bgmFileObjects: [...bgmFileObjects],
                bgmNames: bgmNames ? [...bgmNames] : [null, null],
                bgmAudioInfos: [...bgmAudioInfos],
                seFiles: {...seFiles},
                seFileObjects: {...seFileObjects},
                seNames: seNames ? {...seNames} : {},
                seEnabled: {...seEnabled},  // チェック状態を確実に保存
                bgmMemos: bgmMemos ? [...bgmMemos] : [null, null],
                seMemos: seMemos ? {...seMemos} : {},
                playingAudios: [],  // 再生中のオーディオは保存しない
                maxDuration: maxDuration,
                timelineMaxDuration: timelineMaxDuration,
                pixelsPerSecond: pixelsPerSecond,
                audioBuffers: [...audioBuffers],  // AudioBufferも保存
                bgmStartMinutes: parseInt(bgmStartMinutes.value) || 0,  // 再生開始分を保存
                bgmStartSeconds: parseInt(bgmStartSeconds.value) || 0,  // 再生開始秒を保存
                bgmVolume: parseInt(bgmVolumeSlider.value) || 100,      // BGM音量を保存
                bgmPitch: parseInt(bgmPitchSlider.value) || 100,        // BGM音程を保存
                seVolume: parseInt(seVolumeSlider.value) || 100,        // SE音量を保存
                sePitch: parseInt(sePitchSlider.value) || 100           // SE音程を保存
            };
        }

        function loadPageData(pageNum) {
            const pageData = pages[pageNum - 1];
            bgmFiles = [...pageData.bgmFiles];
            bgmFileObjects = [...(pageData.bgmFileObjects || [null, null])];
            bgmNames = pageData.bgmNames ? [...pageData.bgmNames] : [null, null];
            
            // スライダー設定を復元
            const bgmVolValue = pageData.bgmVolume || 100;
            bgmVolumeSlider.value = bgmVolValue;
            bgmVolumeValue.textContent = bgmVolValue;
            bgmVolume = bgmVolValue / 100;  // グローバル変数を更新
            if (gainNode) gainNode.gain.value = bgmVolume;  // GainNodeも更新
            
            bgmPitchSlider.value = pageData.bgmPitch || 100;
            bgmPitchValue.textContent = pageData.bgmPitch || 100;
            
            const seVolValue = pageData.seVolume || 100;
            seVolumeSlider.value = seVolValue;
            seVolumeValue.textContent = seVolValue;
            seVolume = seVolValue / 100;  // グローバル変数を更新
            if (seGainNode) seGainNode.gain.value = seVolume;  // GainNodeも更新
            
            sePitchSlider.value = pageData.sePitch || 100;
            sePitchValue.textContent = pageData.sePitch || 100;
            bgmAudioInfos = [...pageData.bgmAudioInfos];
            seFiles = {...pageData.seFiles};
            seFileObjects = {...(pageData.seFileObjects || {})};
            seNames = pageData.seNames ? {...pageData.seNames} : {};
            // ===== SE有効状態を復元（デフォルト値を統一）
            seEnabled = pageData.seEnabled ? {...pageData.seEnabled} : getDefaultSeEnabledState();
            bgmMemos = pageData.bgmMemos ? [...pageData.bgmMemos] : [null, null];
            seMemos = pageData.seMemos ? {...pageData.seMemos} : {};
            playingAudios = [];  // 再生中のオーディオはリセット
            maxDuration = pageData.maxDuration;
            timelineMaxDuration = pageData.timelineMaxDuration;
            pixelsPerSecond = pageData.pixelsPerSecond;
            audioBuffers = [...(pageData.audioBuffers || [null, null])];
            
            // チェックボックスの状態を復元（改善版）
            restoreCheckboxStates();
            
            // 再生開始時刻を復元
            bgmStartMinutes.value = pageData.bgmStartMinutes || 0;
            bgmStartSeconds.value = pageData.bgmStartSeconds || 0;

            // ページロード時、SE ファイルをタイムラインに自動表示
            if (seFiles && Object.keys(seFiles).length > 0) {
                loadSeAudioInfosFromFiles();
            }
        }

        // ページロード時に SE ファイルをデコードしてタイムラインに追加
        function loadSeAudioInfosFromFiles() {
            for (let seNum in seFiles) {
                if (seFiles[seNum]) {
                    const fileUrl = seFiles[seNum];
                    const fileName = seNames[seNum] || ('SE ' + seNum);
                    
                    getBlobArrayBuffer(fileUrl)
                        .then(arrayBuffer => {
                            debugLog('ページロードSE ArrayBuffer取得成功', {seNum, fileName, size: arrayBuffer.byteLength});
                            
                            // AudioContext 初期化
                            if (!audioContext || audioContext.state === 'closed') {
                                initAudioContext();
                            }
                            
                            // AudioBuffer にデコード
                            audioContext.decodeAudioData(arrayBuffer,
                                (buffer) => {
                                    // SE メタデータを作成
                                    const audioInfo = {
                                        buffer: buffer,
                                        fileName: fileName,
                                        type: 'se',
                                        duration: buffer.duration,
                                        startBgmTime: 0,
                                        barElement: null,
                                        isPlaying: false
                                    };
                                    
                                    // playingAudios に追加（表示目的）
                                    playingAudios.push(audioInfo);
                                    
                                    // タイムラインに SE バーを作成
                                    createAudioBar(audioInfo);
                                    
                                    // タイムラインを更新
                                    updateTimeline();
                                    
                                    debugLog('ページロードSE デコード完了', {
                                        seNum: seNum,
                                        fileName: fileName,
                                        duration: buffer.duration,
                                        sampleRate: buffer.sampleRate,
                                        numberOfChannels: buffer.numberOfChannels
                                    });
                                },
                                (error) => {
                                    const msg = logError('ページロード時SEデコード失敗', error);
                                    debugLog('ページロード時SEデコード失敗詳細', {
                                        seNum: seNum,
                                        fileName: fileName,
                                        errorType: error?.type,
                                        errorCode: error?.code,
                                        error: msg
                                    });
                                }
                            );
                        })
                        .catch(error => {
                            const msg = logError('ページロード時SEファイル読込失敗', error);
                            debugLog('ページロード時SEファイル読込失敗詳細', {
                                seNum: seNum,
                                fileName: fileName,
                                urlType: fileUrl.startsWith('blob:') ? 'blob' : 'other',
                                error: error.message
                            });
                        });
                }
            }
        }

        function stopAllAudio() {
            // 全ての再生中の音声を停止
            playingAudios.forEach(audioInfo => {
                if (audioInfo && audioInfo.sourceNode) {
                    try {
                        audioInfo.sourceNode.stop();
                    } catch (e) {}
                    audioInfo.isPlaying = false;
                    audioInfo.pauseTime = 0;
                }
            });
            for (let i = 0; i < 2; i++) {
                if (bgmAudioInfos[i] && bgmAudioInfos[i].sourceNode) {
                    try {
                        bgmAudioInfos[i].sourceNode.stop();
                    } catch (e) {}
                    bgmAudioInfos[i].isPlaying = false;
                    bgmAudioInfos[i].pauseTime = 0;
                    bgmAudioInfos[i].autoLoopEnabled = false;  // ページ変更時は自動ループを無効化
                }
            }
        }

        function clearUIElements() {
            // タイムラインをクリア
            timelineCanvas.innerHTML = '';
            timelineRuler.innerHTML = '';
            playingAudios = [];
            playBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
            bgmInfo.textContent = 'BGM: 準備中...';
        }

        function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > MAX_PAGES || pageNum === currentPage) return;

            // 現在のページを保存
            saveCurrentPageData();
            stopAllAudio();  // ← ページ変更時にすべての音声を停止
            clearUIElements();

            // ページを切り替え
            currentPage = pageNum;
            currentPageDisplay.textContent = pageNum;
            loadPageData(pageNum);

            // UI要素を再生成
            generateUIButtons();

            // ボタンテキストを復元
            for (let i = 0; i < 2; i++) {
                if (bgmNames[i]) {
                    const bgmButton = document.querySelector(`.bgm-button[data-bgm="${i}"]`);
                    if (bgmButton) {
                        bgmButton.textContent = bgmNames[i];
                    }
                }
            }
            for (let seNum in seNames) {
                if (seNames[seNum]) {
                    const seButton = document.querySelector(`.se-button[data-se="${seNum}"]`);
                    if (seButton) {
                        seButton.textContent = seNames[seNum];
                    }
                }
            }

            // タイムラインを更新
            generateRuler();

            // BGMバーの再表示
            for (let i = 0; i < 2; i++) {
                if (bgmAudioInfos[i] && bgmAudioInfos[i].buffer) {
                    if (!bgmAudioInfos[i].barElement) {
                        createAudioBar(bgmAudioInfos[i]);
                    } else {
                        // barElement が存在しても DOM に追加されていない可能性
                        if (!timelineCanvas.contains(bgmAudioInfos[i].barElement)) {
                            timelineCanvas.appendChild(bgmAudioInfos[i].barElement);
                        }
                    }
                }
            }

            // BGM1を自動配置（ページ変更時）
            if (bgmFiles[0] && !bgmAudioInfos[0]) {
                bgmAudioInfos[0] = setupBGM(bgmFiles[0], bgmNames[0] || 'BGM 1', 0);
            } else if (!bgmFiles[0] && bgmAudioInfos[0]) {
                // BGM1が削除されていればクリア
                bgmAudioInfos[0] = null;
            }

            // 矢印ボタンの有効/無効を制御
            leftArrowBtn.disabled = currentPage === 1;
            rightArrowBtn.disabled = currentPage === MAX_PAGES;
        }

        // 矢印ボタンのイベントリスナー
        leftArrowBtn.addEventListener('click', () => {
            debugLog('Left arrow button clicked - stopping all audio');
            goToPage(currentPage - 1);
        });
        rightArrowBtn.addEventListener('click', () => {
            debugLog('Right arrow button clicked - stopping all audio');
            goToPage(currentPage + 1);
        });

        // 保存ボタンのイベントリスナー
        saveBtn.addEventListener('click', async () => {
            try {
                // iOS/iPad環境を検出
                const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
                
                if (isIOS && navigator.share) {
                    // iOS/iPad: navigator.share() を使用
                    const saveData = await prepareSaveData();
                    const jsonString = JSON.stringify(saveData, null, 2);
                    const fileName = '劇音声ソフト_設定_' + new Date().toISOString().slice(0, 10) + '.json';
                    const blob = new Blob([jsonString], { type: 'application/json' });
                    
                    try {
                        const file = new File([blob], fileName, { type: 'application/json' });
                        await navigator.share({
                            files: [file],
                            title: '劇音声ソフト設定',
                            text: '劇音声ソフトの設定ファイルです'
                        });
                        console.log('ファイルをシェアしました');
                    } catch (error) {
                        if (error.name !== 'AbortError') {
                            console.error('Share error:', error);
                            // フォールバック: 従来のダウンロード方式
                            saveAllPageData();
                        }
                    }
                } else if (isIOS && !navigator.share) {
                    // iOS/iPad（古いブラウザ）: 従来のダウンロード方式
                    saveAllPageData();
                } else {
                    // その他のブラウザ: File System Access API を試す
                    if (window.showSaveFilePicker) {
                        try {
                            const handle = await window.showSaveFilePicker({
                                suggestedName: '劇音声ソフト_設定_' + new Date().toISOString().slice(0, 10) + '.json',
                                types: [{
                                    description: 'JSON File',
                                    accept: { 'application/json': ['.json'] }
                                }],
                                startIn: 'documents'
                            });
                            
                            const writable = await handle.createWritable();
                            const saveData = await prepareSaveData();
                            const jsonString = JSON.stringify(saveData, null, 2);
                            await writable.write(jsonString);
                            await writable.close();
                            alert('設定を保存しました！');
                        } catch (error) {
                            if (error.name !== 'AbortError') {
                                console.error('File save error:', error);
                                // フォールバック: 従来のダウンロード方式
                                saveAllPageData();
                            }
                        }
                    } else {
                        // File System Access API が使用不可: 従来のダウンロード方式
                        saveAllPageData();
                    }
                }
            } catch (error) {
                alert('保存中にエラーが発生しました：' + error.message);
            }
        });

        // 読み込みボタンのイベントリスナー
        loadBtn.addEventListener('click', () => {
            const browserInfo = getBrowserInfo();
            debugLog('Load button clicked', browserInfo);
            
            if (browserInfo.isMobile) {
                debugLog('Mobile device detected - opening file picker');
            }
            
            loadFileInput.click();
        });

        loadFileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                debugLog('No file selected');
                return;
            }

            // ファイル検証
            if (!file.name.endsWith('.json')) {
                alert('JSONファイルを選択してください。(.jsonファイルが必要です)');
                loadFileInput.value = '';
                return;
            }

            if (file.size > 50 * 1024 * 1024) {  // 50MB制限
                alert('ファイルが大きすぎます。50MB以下のファイルを使用してください。');
                loadFileInput.value = '';
                return;
            }

            try {
                debugLog('Loading file', {name: file.name, size: file.size});
                loadAllPageData(file);
            } catch (error) {
                const msg = logError('ファイル読み込み処理エラー', error);
                alert('ファイルの読み込みに失敗しました:\n' + error.message);
            }

            // ファイル入力をリセット
            loadFileInput.value = '';
        });

        // 保存用データを準備する関数（非同期）
        async function prepareSaveData() {
            const saveData = {
                version: "1.0",
                currentPage: currentPage,
                pages: []
            };

            for (let i = 0; i < MAX_PAGES; i++) {
                const pageData = pages[i];
                const bgmBase64 = [null, null];
                const seBase64 = {};

                // BGM ファイルを Base64 に変換
                for (let j = 0; j < 2; j++) {
                    if (pageData.bgmFileObjects && pageData.bgmFileObjects[j]) {
                        const file = pageData.bgmFileObjects[j];
                        const arrayBuffer = await file.arrayBuffer();
                        bgmBase64[j] = arrayBufferToBase64(arrayBuffer);
                    }
                }

                // SE ファイルを Base64 に変換
                if (pageData.seFileObjects) {
                    for (let seNum in pageData.seFileObjects) {
                        const file = pageData.seFileObjects[seNum];
                        if (file) {
                            const arrayBuffer = await file.arrayBuffer();
                            seBase64[seNum] = arrayBufferToBase64(arrayBuffer);
                        }
                    }
                }

                saveData.pages.push({
                    pageNum: i + 1,
                    bgmNames: pageData.bgmNames ? [...pageData.bgmNames] : [null, null],
                    seNames: pageData.seNames ? {...pageData.seNames} : {},
                    seEnabled: pageData.seEnabled ? {...pageData.seEnabled} : getDefaultSeEnabledState(),
                    bgmMemos: pageData.bgmMemos || [null, null],
                    seMemos: pageData.seMemos || {},
                    bgmAudio: bgmBase64,
                    seAudio: seBase64,
                    bgmStartMinutes: pageData.bgmStartMinutes || 0,    // 再生開始分を保存
                    bgmStartSeconds: pageData.bgmStartSeconds || 0,    // 再生開始秒を保存
                    bgmVolume: pageData.bgmVolume || 100,              // BGM音量を保存
                    bgmPitch: pageData.bgmPitch || 100,                // BGM音程を保存
                    seVolume: pageData.seVolume || 100,                // SE音量を保存
                    sePitch: pageData.sePitch || 100                   // SE音程を保存
                });
            }

            return saveData;
        }

        // 全ページのデータを保存する関数（非同期）
        async function saveAllPageData() {
            const saveData = await prepareSaveData();

            // JSON を文字列に変換
            const jsonString = JSON.stringify(saveData, null, 2);
            const fileName = '劇音声ソフト_設定_' + new Date().toISOString().slice(0, 10) + '.json';

            // Blob を作成
            const blob = new Blob([jsonString], { type: 'application/json' });

            // iOS/iPad: navigator.share() を使用してファイルアプリに保存
            if (navigator.share && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
                try {
                    const file = new File([blob], fileName, { type: 'application/json' });
                    await navigator.share({
                        files: [file],
                        title: '劇音声ソフト設定',
                        text: '劇音声ソフトの設定ファイルです'
                    });
                    console.log('ファイルをシェアしました');
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        console.error('Share error:', error);
                        // フォールバック: 従来のダウンロード方式
                        downloadFile(blob, fileName);
                    }
                }
            } else {
                // その他のブラウザ: 従来のダウンロード方式
                downloadFile(blob, fileName);
            }

            function downloadFile(blob, fileName) {
                try {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    
                    // Safari互換性: 少し遅延させて削除
                    setTimeout(() => {
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    }, 100);

                    alert('設定を保存しました！');
                } catch (error) {
                    console.error('Download error:', error);
                    alert('保存に失敗しました。プライベートブラウズモードではダウンロード機能が制限される場合があります。');
                }
            }
        }

        // ファイルから設定を読み込む関数
        // ===== グローバルエラーハンドラ =====
        window.addEventListener('error', (event) => {
            const errorMsg = `予期しないエラー: ${event.message} (行:${event.lineno}, 列:${event.colno})`;
            const fullError = {
                message: event.message,
                lineno: event.lineno,
                colno: event.colno,
                filename: event.filename,
                error: event.error,
                timestamp: new Date().toISOString()
            };
            
            debugLog('Global error caught', fullError);
            console.error('Global error:', fullError);
            
            // エラーをログパネルに記録
            if (!window.lastErrorTime || (Date.now() - window.lastErrorTime > 3000)) {
                window.lastErrorTime = Date.now();
            }
        });

        // ===== Promise拒否エラーハンドラ =====
        window.addEventListener('unhandledrejection', (event) => {
            const errorMsg = `Promise拒否エラー: ${event.reason?.message || String(event.reason)}`;
            const fullError = {
                reason: event.reason,
                promise: event.promise,
                timestamp: new Date().toISOString()
            };
            
            debugLog('Unhandled Promise rejection', fullError);
            console.error('Unhandled rejection:', fullError);
            
            event.preventDefault();  // ブラウザのデフォルトハンドリングを抑制
        });

                            <div style="margin-top: 8px;"><strong>【ロード状況】</strong></div>

                    `;
